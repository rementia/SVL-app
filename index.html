<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png" />
  <link rel="apple-touch-icon" href="SVL_icon.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      touch-action: manipulation;
      overflow: hidden;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #ffffff;
      color: #111;
    }

    button,
    .word-item {
      touch-action: manipulation;
    }

    body.loading {
      visibility: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: min(92vw, 860px);
      padding: 0 8px;
    }

    .vol-btn,
    .favorite-list-btn {
      font-size: 16px;
      padding: 10px 18px;
      border: 1px solid #bbb;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      min-width: 84px;
      transition: 0.15s;
    }

    .vol-btn:hover,
    .favorite-list-btn:hover {
      background: #f2f2f2;
    }

    .vol-btn.active-vol,
    .favorite-list-btn.active-vol {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .toggle-btn,
    .auto-speak-btn,
    .parts-toggle-btn,
    .favorite-toggle-btn {
      position: absolute;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .toggle-btn:hover,
    .auto-speak-btn:hover,
    .parts-toggle-btn:hover,
    .favorite-toggle-btn:hover {
      background: #f2f2f2;
    }

    .toggle-btn {
      top: 14px;
      left: 12px;
    }

    .auto-speak-btn {
      top: 14px;
      left: 96px;
    }

    .parts-toggle-btn {
      top: 14px;
      right: 12px;
    }

    .favorite-toggle-btn {
      top: 14px;
      right: 92px;
      min-width: 68px;
      font-weight: 700;
    }

    .auto-speak-btn.active {
      background: #2f7df6;
      color: #fff;
      border-color: #2f7df6;
    }

    .favorite-toggle-btn.active {
      background: #80adef;
      color: #111;
      border-color: #80adef;
    }

    .speak-btn {
      background: #2f7df6;
    }

    .speak-btn:hover {
      opacity: 0.9;
    }

    .sidebar {
      position: absolute;
      top: 70px;
      left: 0;
      width: 150px;
      height: calc(100vh - 70px);
      border-right: 1px solid #ddd;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px 8px 20px;
      z-index: 15;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .word-item {
      padding: 10px 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.2;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .word-item:hover {
      background: #ececec;
    }

    .word-item.active {
      background: #dcdcdc;
      font-weight: bold;
    }

    .word-label {
      min-width: 0;
      flex: 1;
      word-break: break-word;
    }

    .item-star {
      flex-shrink: 0;
      color: #d39e00;
      font-size: 14px;
      line-height: 1;
      opacity: 0.95;
    }

    .main {
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      height: calc(100vh - 70px);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-layout {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .center-box {
      min-width: 0;
      width: 100%;
      max-width: 920px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px 24px;
    }

    .parts-panel {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%) translateX(0);
      width: 280px;
      min-width: 280px;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 0 18px 12px;
      border-left: 1px solid #e3e3e3;
      background: #fff;
      opacity: 1;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .parts-panel.hidden {
      transform: translateY(-50%) translateX(110%);
      opacity: 0;
      pointer-events: none;
    }

    .parts-title {
      font-size: 14px;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      text-align: left;
    }

    .current-vol {
      font-size: 14px;
      color: #666;
      letter-spacing: 0.08em;
      margin-top: 10px;
    }

    #word {
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #meaning {
      font-size: clamp(22px, 3.4vw, 34px);
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    #pronunciation {
      font-size: clamp(14px, 1.8vw, 20px);
      color: #666;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    #image {
      font-size: clamp(13px, 1.4vw, 17px);
      color: #666;
      line-height: 1.8;
      word-break: break-word;
      overflow-wrap: anywhere;
      text-align: left;
      min-height: 5.5em;
    }

    .hint-note {
      display: block;
      margin-top: 10px;
      font-size: 0.72em;
      color: #888;
    }

    .button-row {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .nav-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 160px;
    }

    .nav-hint {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
      color: #333;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .main-btn {
      margin-top: 8px;
      font-size: clamp(18px, 2.6vw, 28px);
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      background: #111;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }

    .main-btn:hover {
      opacity: 0.92;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 110px;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        top: 10px;
        width: calc(100vw - 120px);
        gap: 6px;
      }

      .vol-btn,
      .favorite-list-btn {
        font-size: 14px;
        padding: 8px 12px;
        min-width: 72px;
      }

      .toggle-btn,
      .auto-speak-btn,
      .parts-toggle-btn,
      .favorite-toggle-btn {
        top: 10px;
        font-size: 13px;
        padding: 8px 12px;
      }

      .toggle-btn {
        left: 10px;
      }

      .auto-speak-btn {
        left: 86px;
      }

      .parts-toggle-btn {
        right: 10px;
      }

      .favorite-toggle-btn {
        right: 82px;
      }

      .sidebar {
        top: 60px;
        width: 100px;
        height: calc(100vh - 60px);
        padding: 8px 6px 16px;
      }

      .main {
        top: 60px;
        height: calc(100vh - 60px);
        padding: 12px;
      }

      .word-item {
        font-size: 13px;
        padding: 8px 6px;
      }

      .center-box {
        gap: 16px;
        padding: 8px 12px;
      }

      .main-btn {
        padding: 14px 22px;
      }

      .parts-panel {
        width: 220px;
        min-width: 220px;
        max-width: 220px;
        padding: 12px 0 12px 8px;
      }

      #image {
        font-size: clamp(12px, 2vw, 15px);
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      .parts-panel {
        width: 200px;
        min-width: 200px;
        max-width: 200px;
        padding: 12px 0 12px 8px;
        align-items: stretch;
      }

      #image {
        width: 100%;
        max-width: 100%;
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        width: calc(100vw - 110px);
      }

      .center-box {
        gap: 14px;
      }

      #word {
        font-size: clamp(30px, 8vw, 52px);
      }

      #meaning {
        font-size: clamp(20px, 5vw, 28px);
      }

      .nav-hint {
        font-size: clamp(14px, 3.4vw, 18px);
      }

      .parts-panel {
        width: 180px;
        min-width: 180px;
        max-width: 180px;
        padding: 10px 0 10px 6px;
      }

      .parts-title {
        font-size: 12px;
      }

      #image {
        font-size: clamp(11px, 2.8vw, 13px);
      }
    }

    @media (prefers-color-scheme: dark) {
      html,
      body {
        background: #111;
        color: #eee;
      }

      .app,
      .parts-panel {
        background: #111;
      }

      .sidebar {
        background: #1a1a1a;
        border-right: 1px solid #333;
      }

      .word-item:hover {
        background: #2a2a2a;
      }

      .word-item.active {
        background: #333;
        color: #fff;
      }

      .vol-btn,
      .favorite-list-btn,
      .toggle-btn,
      .auto-speak-btn,
      .parts-toggle-btn,
      .favorite-toggle-btn {
        background: #1f1f1f;
        color: #eee;
        border-color: #444;
      }

      .vol-btn:hover,
      .favorite-list-btn:hover,
      .toggle-btn:hover,
      .auto-speak-btn:hover,
      .parts-toggle-btn:hover,
      .favorite-toggle-btn:hover {
        background: #2a2a2a;
      }

      .vol-btn.active-vol,
      .favorite-list-btn.active-vol {
        background: #eee;
        color: #111;
        border-color: #eee;
      }

      .favorite-toggle-btn.active {
        background: #f5c542;
        color: #111;
        border-color: #f5c542;
      }

      .parts-panel {
        border-left: 1px solid #333;
      }

      .current-vol,
      .parts-title,
      #image,
      #pronunciation,
      .hint-note {
        color: #bbb;
      }

      #word,
      #meaning,
      .nav-hint {
        color: #f5f5f5;
      }

      .main-btn {
        background: #eaeaea;
        color: #111;
      }
    }
  </style>
</head>
<body class="loading">
  <div class="app">
    <button class="toggle-btn" onclick="toggleSidebar()">一覧</button>
    <button class="auto-speak-btn" id="autoSpeakBtn" onclick="toggleAutoSpeak()">自動発音：OFF</button>
    <button class="favorite-toggle-btn" id="favoriteToggleBtn" onclick="toggleFavoriteCurrentWord()">☆</button>
    <button class="parts-toggle-btn" onclick="togglePartsPanel()">形態素</button>

    <div class="top-bar">
      <button class="vol-btn" data-vol="vol1" onclick="loadSheet('vol1')">vol.1</button>
      <button class="vol-btn" data-vol="vol2" onclick="loadSheet('vol2')">vol.2</button>
      <button class="vol-btn" data-vol="vol3" onclick="loadSheet('vol3')">vol.3</button>
      <button class="vol-btn" data-vol="vol4" onclick="loadSheet('vol4')">vol.4</button>
      <button class="favorite-list-btn" id="favoriteListBtn" onclick="loadFavoritesMode()">★</button>
    </div>

    <div class="sidebar" id="sidebar">
      <div id="list"></div>
    </div>

    <main class="main">
      <div class="main-layout">
        <div class="center-box">
          <div class="current-vol" id="current">vol.1</div>
          <div id="word">読み込み中...</div>
          <div id="meaning"></div>

          <div class="button-row">
            <div class="nav-box">
              <div class="nav-hint" id="prevHint"></div>
              <button class="main-btn" onclick="prevWord()">戻る</button>
            </div>

            <div class="nav-box">
              <div id="pronunciation"></div>
              <button class="main-btn speak-btn" onclick="speakWord()">発音</button>
            </div>

            <div class="nav-box">
              <div class="nav-hint" id="nextHint"></div>
              <button class="main-btn" onclick="nextWord()">進む</button>
            </div>
          </div>
        </div>

        <aside class="parts-panel" id="partsPanel">
          <div class="parts-title">morpheme</div>
          <div id="image"></div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    // =========================
    // Data sources
    // =========================
    const sheetUrls = {
      vol1: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=0",
      vol2: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=1906065075",
      vol3: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=769789994",
      vol4: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=297106222"
    };

    const volOrder = ["vol1", "vol2", "vol3", "vol4"];

    // =========================
    // Storage keys
    // =========================
    const STORAGE_KEYS = {
      vol: "tango_current_vol",
      indexByVol: "tango_index_by_vol",
      sidebarOpen: "tango_sidebar_open",
      partsOpen: "tango_parts_open",
      autoSpeak: "tango_auto_speak",
      favorites: "tango_favorites"
    };

    // =========================
    // Morpheme dictionaries
    // =========================
    const prefixMap = {
      sub: "下に・下から",
      pro: "前へ",
      ob: "向かって",
      trans: "越えて・向こうへ",
      re: "再び・元に戻って",
      de: "下へ・離れて",
      con: "共に・一緒に",
      com: "共に・一緒に",
      in: "中へ・中に",
      im: "中へ・中に",
      ex: "外へ",
      pre: "前もって",
      inter: "間に",
      dis: "離れて・打消し",
      un: "打消し",
      ad: "〜へ"
    };

    const suffixMap = {
      ject: "投げる",
      mit: "送る・置く",
      port: "運ぶ",
      spect: "見る",
      struct: "積み上げる・組み立てる",
      scribe: "書く",
      script: "書かれたもの",
      dict: "言う",
      form: "形",
      move: "動く",
      pose: "置く",
      press: "押す",
      tract: "引く",
      vent: "来る",
      ceive: "受け取る",
      tend: "伸ばす・向ける"
    };

    // =========================
    // App state
    // =========================
    let allWordsByVol = {
      vol1: [],
      vol2: [],
      vol3: [],
      vol4: []
    };

    let words = [];
    let index = 0;
    let currentVol = "vol1";
    let currentMode = "vol"; // 'vol' | 'favorites'
    let sidebarOpen = true;
    let partsOpen = true;
    let autoSpeak = false;
    let favorites = {};

    let indexByVol = {
      vol1: 0,
      vol2: 0,
      vol3: 0,
      vol4: 0,
      favorites: 0
    };

    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;
    let lastTouchEnd = 0;

    // =========================
    // Initialization
    // =========================
    function init() {
      loadSavedState();
      bindTouchEvents();
      loadSheet(currentVol);
    }

    function loadSavedState() {
      const savedVol = localStorage.getItem(STORAGE_KEYS.vol);
      const savedSidebarOpen = localStorage.getItem(STORAGE_KEYS.sidebarOpen);
      const savedPartsOpen = localStorage.getItem(STORAGE_KEYS.partsOpen);
      const savedAutoSpeak = localStorage.getItem(STORAGE_KEYS.autoSpeak);
      const savedIndexByVol = localStorage.getItem(STORAGE_KEYS.indexByVol);
      const savedFavorites = localStorage.getItem(STORAGE_KEYS.favorites);

      if (savedVol && sheetUrls[savedVol]) {
        currentVol = savedVol;
      }

      if (savedSidebarOpen !== null) {
        sidebarOpen = savedSidebarOpen === "true";
      }

      if (savedPartsOpen !== null) {
        partsOpen = savedPartsOpen === "true";
      }

      if (savedAutoSpeak !== null) {
        autoSpeak = savedAutoSpeak === "true";
      }

      if (savedIndexByVol) {
        try {
          const parsed = JSON.parse(savedIndexByVol);
          indexByVol = { ...indexByVol, ...parsed };
        } catch (error) {
          console.warn("indexByVol restore failed", error);
        }
      }

      if (savedFavorites) {
        try {
          favorites = JSON.parse(savedFavorites);
        } catch (error) {
          favorites = {};
        }
      }

      updateAutoSpeakButton();
      applySidebarState();
      applyPartsState();
    }

    function bindTouchEvents() {
      document.addEventListener(
        "touchstart",
        function (event) {
          const touch = event.changedTouches[0];
          touchStartX = touch.screenX;
          touchStartY = touch.screenY;
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        function (event) {
          const touch = event.changedTouches[0];
          touchEndX = touch.screenX;
          touchEndY = touch.screenY;
          handleSwipe();
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        function (event) {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        },
        { passive: false }
      );
    }

    // =========================
    // Storage helpers
    // =========================
    function saveCurrentVol() {
      localStorage.setItem(STORAGE_KEYS.vol, currentVol);
    }

    function saveIndexByVol() {
      localStorage.setItem(STORAGE_KEYS.indexByVol, JSON.stringify(indexByVol));
    }

    function saveSidebarState() {
      localStorage.setItem(STORAGE_KEYS.sidebarOpen, String(sidebarOpen));
    }

    function savePartsState() {
      localStorage.setItem(STORAGE_KEYS.partsOpen, String(partsOpen));
    }

    function saveAutoSpeakState() {
      localStorage.setItem(STORAGE_KEYS.autoSpeak, String(autoSpeak));
    }

    function saveFavorites() {
      localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(favorites));
    }

    // =========================
    // Favorite helpers
    // =========================
    function makeFavoriteKey(vol, word) {
      return `${vol}::${String(word).toLowerCase().trim()}`;
    }

    function isFavorite(vol, word) {
      return !!favorites[makeFavoriteKey(vol, word)];
    }

    function buildFavoriteEntries() {
      const entries = [];

      volOrder.forEach((vol) => {
        const source = allWordsByVol[vol] || [];
        source.forEach((item) => {
          if (isFavorite(vol, item.word)) {
            entries.push({
              ...item,
              sourceVol: vol
            });
          }
        });
      });

      return entries;
    }

    function toggleFavoriteCurrentWord() {
      const current = getCurrentWord();
      if (!current || !current.sourceVol) return;

      const key = makeFavoriteKey(current.sourceVol, current.word);

      if (favorites[key]) {
        delete favorites[key];
      } else {
        favorites[key] = true;
      }

      saveFavorites();
      updateFavoriteToggleButton();
      createList();

      if (currentMode === "favorites") {
        const currentWord = current.word;
        const currentVolOfWord = current.sourceVol;
        const favoriteEntries = buildFavoriteEntries();

        if (favoriteEntries.length === 0) {
          currentMode = "vol";
          loadSheet(currentVol);
          return;
        }

        words = favoriteEntries;
        const newIndex = words.findIndex(
          (item) => item.word === currentWord && item.sourceVol === currentVolOfWord
        );
        index = newIndex >= 0 ? newIndex : Math.min(index, words.length - 1);
        indexByVol.favorites = index;
        saveIndexByVol();
        render();
      }
    }

    function loadFavoritesMode() {
      const favoriteEntries = buildFavoriteEntries();

      if (favoriteEntries.length === 0) {
        alert("★未登録");
        return;
      }

      currentMode = "favorites";
      words = favoriteEntries;
      index = Math.min(indexByVol.favorites || 0, words.length - 1);
      render();
    }

    // =========================
    // Data loading
    // =========================
    async function loadSheet(volName) {
      try {
        currentMode = "vol";
        currentVol = volName;
        saveCurrentVol();

        if (!allWordsByVol[volName] || allWordsByVol[volName].length === 0) {
          const response = await fetch(sheetUrls[volName]);
          const text = await response.text();
          allWordsByVol[volName] = parseCsvToWords(text, volName);
        }

        words = [...allWordsByVol[volName]];
        index = Math.min(indexByVol[volName] || 0, Math.max(words.length - 1, 0));
        render();

        document.body.classList.remove("loading");
      } catch (error) {
        console.error(error);
        document.body.classList.remove("loading");
        alert("読み込みに失敗しました。スプレッドシートの共有設定をご確認ください。");
      }
    }

    function parseCsvToWords(text, volName) {
      return text
        .trim()
        .split("\n")
        .map((line) => line.trim())
        .filter((line) => line !== "")
        .map((line) => {
          const [word, meaning] = line.split(",");
          return {
            word: (word || "").trim(),
            meaning: (meaning || "").trim(),
            sourceVol: volName
          };
        })
        .filter((item) => item.word);
    }

    // =========================
    // Render
    // =========================
    function render() {
      createList();
      showWord();
      updateCurrentLabel();
      updateTopButtons();
      applySidebarState();
      applyPartsState();
    }

    function showWord() {
      const current = getCurrentWord();
      if (!current) {
        document.getElementById("word").textContent = "単語がありません";
        document.getElementById("meaning").textContent = "";
        document.getElementById("image").innerHTML = "";
        document.getElementById("pronunciation").textContent = "";
        document.getElementById("prevHint").textContent = "";
        document.getElementById("nextHint").textContent = "";
        updateFavoriteToggleButton();
        return;
      }

      document.getElementById("word").textContent = current.word;
      document.getElementById("meaning").textContent = current.meaning;
      document.getElementById("image").innerHTML = getCoreImage(current.word);

      if (currentMode === "vol") {
        indexByVol[currentVol] = index;
      } else {
        indexByVol.favorites = index;
      }
      saveIndexByVol();

      highlightActiveWord();
      scrollActiveWordIntoView();
      updateNavHints();
      updateFavoriteToggleButton();
      loadPronunciation(current.word);

      if (autoSpeak) {
        setTimeout(() => {
          speakWord();
        }, 150);
      }
    }

    function createList() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      words.forEach((item, itemIndex) => {
        const row = document.createElement("div");
        row.className = "word-item";
        row.onclick = () => {
          index = itemIndex;
          showWord();
        };

        const label = document.createElement("span");
        label.className = "word-label";
        label.textContent = currentMode === "favorites"
          ? `${item.word} (${item.sourceVol.replace("vol", "vol.")})`
          : item.word;

        row.appendChild(label);

        if (isFavorite(item.sourceVol, item.word)) {
          const star = document.createElement("span");
          star.className = "item-star";
          star.textContent = "★";
          row.appendChild(star);
        }

        list.appendChild(row);
      });

      highlightActiveWord();
    }

    function updateCurrentLabel() {
      const currentEl = document.getElementById("current");
      if (currentMode === "favorites") {
        currentEl.textContent = "★";
        return;
      }

      const volNumber = currentVol.replace("vol", "");
      currentEl.textContent = `vol.${volNumber}`;
    }

    function updateTopButtons() {
      const volButtons = document.querySelectorAll(".vol-btn");
      volButtons.forEach((button) => {
        const isActive = currentMode === "vol" && button.dataset.vol === currentVol;
        button.classList.toggle("active-vol", isActive);
      });

      document
        .getElementById("favoriteListBtn")
        .classList.toggle("active-vol", currentMode === "favorites");
    }

    function updateFavoriteToggleButton() {
      const button = document.getElementById("favoriteToggleBtn");
      const current = getCurrentWord();

      if (!button || !current) return;

      const active = isFavorite(current.sourceVol, current.word);
      button.textContent = active ? "★" : "☆";
      button.classList.toggle("active", active);
      button.title = active ? "★解除" : "★登録";
    }

    function updateNavHints() {
      if (!words.length) return;

      const prevIndex = (index - 1 + words.length) % words.length;
      const nextIndex = (index + 1) % words.length;

      const prevItem = words[prevIndex];
      const nextItem = words[nextIndex];

      document.getElementById("prevHint").textContent = prevItem ? prevItem.word : "";
      document.getElementById("nextHint").textContent = nextItem ? nextItem.word : "";
    }

    function updateAutoSpeakButton() {
      const button = document.getElementById("autoSpeakBtn");
      if (!button) return;

      button.textContent = autoSpeak ? "自動発音：ON" : "自動発音：OFF";
      button.classList.toggle("active", autoSpeak);
    }

    function highlightActiveWord() {
      const items = document.querySelectorAll(".word-item");
      items.forEach((item, itemIndex) => {
        item.classList.toggle("active", itemIndex === index);
      });
    }

    function scrollActiveWordIntoView() {
      const items = document.querySelectorAll(".word-item");
      const active = items[index];

      if (active) {
        active.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    // =========================
    // View state toggles
    // =========================
    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      saveSidebarState();
      applySidebarState();
    }

    function applySidebarState() {
      const sidebar = document.getElementById("sidebar");
      if (!sidebar) return;
      sidebar.classList.toggle("hidden", !sidebarOpen);
    }

    function togglePartsPanel() {
      partsOpen = !partsOpen;
      savePartsState();
      applyPartsState();
    }

    function applyPartsState() {
      const panel = document.getElementById("partsPanel");
      if (!panel) return;
      panel.classList.toggle("hidden", !partsOpen);
    }

    function toggleAutoSpeak() {
      autoSpeak = !autoSpeak;
      saveAutoSpeakState();
      updateAutoSpeakButton();
    }

    // =========================
    // Word navigation
    // =========================
    function prevWord() {
      if (!words.length) return;
      index = (index - 1 + words.length) % words.length;
      showWord();
    }

    function nextWord() {
      if (!words.length) return;
      index = (index + 1) % words.length;
      showWord();
    }

    function getCurrentWord() {
      return words[index] || null;
    }

    // =========================
    // Speech
    // =========================
    function speakWord() {
      const current = getCurrentWord();
      if (!current) return;

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(current.word);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      speechSynthesis.speak(utterance);
    }

    async function loadPronunciation(word) {
      const key = `pron_${String(word).toLowerCase().trim()}`;
      const pronunciationEl = document.getElementById("pronunciation");
      if (!pronunciationEl) return;

      const cached = localStorage.getItem(key);
      if (cached !== null) {
        pronunciationEl.textContent = cached;
        return;
      }

      pronunciationEl.textContent = "";

      try {
        const response = await fetch(
          `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
        );
        const data = await response.json();

        let phonetic = "";

        if (Array.isArray(data) && data[0]) {
          if (data[0].phonetic) {
            phonetic = data[0].phonetic;
          } else if (Array.isArray(data[0].phonetics)) {
            const found = data[0].phonetics.find((item) => item && item.text);
            phonetic = found ? found.text : "";
          }
        }

        phonetic = phonetic.replace(/^\/|\/$/g, "");
        pronunciationEl.textContent = phonetic;
        localStorage.setItem(key, phonetic);
      } catch (error) {
        pronunciationEl.textContent = "";
        localStorage.setItem(key, "");
      }
    }

    // =========================
    // Morpheme
    // =========================
    function getCoreImage(word) {
      const cacheKey = `core_v2_${String(word).toLowerCase().trim()}`;
      const cached = localStorage.getItem(cacheKey);
      if (cached !== null) return cached;

      const result = buildCoreImage(word);
      localStorage.setItem(cacheKey, result);
      return result;
    }

    function buildCoreImage(word) {
      const normalized = String(word).toLowerCase().trim();
      const prefixes = Object.keys(prefixMap).sort((a, b) => b.length - a.length);
      const suffixes = Object.keys(suffixMap).sort((a, b) => b.length - a.length);

      const foundPrefix = prefixes.find((prefix) => normalized.startsWith(prefix));
      const foundSuffix = suffixes.find((suffix) => normalized.endsWith(suffix));

      const lines = [];

      if (foundPrefix) {
        lines.push(`接頭辞：${foundPrefix}（${prefixMap[foundPrefix]}）`);
      }

      if (foundSuffix) {
        lines.push(`接尾辞：${foundSuffix}（${suffixMap[foundSuffix]}）`);
      }

      if (foundPrefix || foundSuffix) {
        lines.push('<span class="hint-note">※ 確定ではなく候補</span>');
        return lines.join("<br>");
      }

      return "";
    }

    // =========================
    // Swipe
    // =========================
    function handleSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = Math.abs(touchEndY - touchStartY);
      const thresholdX = 50;
      const thresholdY = 50;

      if (Math.abs(diffX) < thresholdX) return;
      if (diffY > thresholdY) return;

      if (diffX > 0) {
        prevWord();
      } else {
        nextWord();
      }
    }

    init();
  </script>
</body>
</html>
