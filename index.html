<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png" />
  <link rel="apple-touch-icon" href="SVL_icon.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    :root {
      --app-bg: #ffffff;
      --app-text: #111111;
      --muted-text: #666666;
      --soft-text: #888888;
      --border: #bbbbbb;
      --border-strong: #444444;
      --sidebar-border: #dddddd;
      --sidebar-bg: #fafafa;
      --hover-bg: #f2f2f2;
      --list-hover-bg: #ececec;
      --list-active-bg: #dcdcdc;
      --btn-bg: #ffffff;
      --btn-text: #111111;
      --accent: #2f7df6;
      --accent-contrast: #ffffff;
      --pill-radius: 999px;
      --control-radius: 12px;
      --main-btn-radius: 16px;
      --header-offset: 70px;
      --header-top: 12px;
      --sidebar-width: 150px;
      --sidebar-padding: 10px 8px 20px;
      --main-padding: 16px;
      --topbar-width: min(92vw, 860px);
      --topbar-gap: 8px;
      --login-bottom: 12px;
      --login-right: 12px;
      --login-user-bottom: 14px;
      --login-user-left: 12px;
      --control-font-size: 14px;
      --control-padding: 10px 14px;
      --control-min-width: 56px;
      --vol-font-size: 16px;
      --vol-padding: 10px 18px;
      --vol-min-width: 84px;
      --toggle-top: 14px;
      --toggle-left: 12px;
      --auto-top: 14px;
      --auto-left: 96px;
      --challenge-top: 14px;
      --challenge-right: 100px;
      --random-top: 14px;
      --random-right: 200px;
      --control-stack-width: auto;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      touch-action: manipulation;
      overflow: hidden;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: var(--app-bg);
      color: var(--app-text);
    }

    button,
    .word-item {
      touch-action: manipulation;
    }

    body.loading {
      visibility: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--app-bg);
    }

    .top-bar {
      position: absolute;
      top: var(--header-top);
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: var(--topbar-gap);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: var(--topbar-width);
      padding: 0 8px;
    }

    .vol-btn,
    .favorite-list-btn {
      font-size: var(--vol-font-size);
      padding: var(--vol-padding);
      border: 1px solid var(--border);
      border-radius: var(--pill-radius);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      min-width: var(--vol-min-width);
      transition: 0.15s;
    }

    .vol-btn:hover,
    .favorite-list-btn:hover,
    .control-btn:hover,
    .login-btn:hover {
      background: var(--hover-bg);
    }

    .vol-btn.active-vol,
    .favorite-list-btn.active-vol {
      background: var(--app-text);
      color: var(--app-bg);
      border-color: var(--app-text);
    }

    .control-btn,
    .login-btn {
      border: 1px solid var(--border);
      border-radius: var(--control-radius);
      background: var(--btn-bg);
      color: var(--soft-text);
      cursor: pointer;
    }

    .control-btn {
      position: absolute;
      z-index: 35;
      font-size: var(--control-font-size);
      padding: var(--control-padding);
      min-width: var(--control-min-width);
    }

    .control-btn.is-emphasized,
    .control-btn.active {
      font-weight: 700;
    }

    .control-btn.active-blue {
      background: var(--accent);
      color: var(--accent-contrast);
      border-color: var(--border-strong);
    }

    .toggle-btn {
      top: var(--toggle-top);
      left: var(--toggle-left);
    }

    .auto-speak-btn {
      top: var(--auto-top);
      left: var(--auto-left);
    }

    .challenge-btn {
      top: var(--challenge-top);
      right: var(--challenge-right);
    }

    .random-btn {
      top: var(--random-top);
      right: var(--random-right);
    }

    .favorite-toggle-btn.active {
      background: var(--btn-bg);
      color: var(--accent);
      border-color: var(--border-strong);
    }

    .speak-btn {
      background: var(--accent);
    }

    .speak-btn:hover {
      opacity: 0.9;
    }

    .sidebar {
      position: absolute;
      top: var(--header-offset);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--header-offset));
      border-right: 1px solid var(--sidebar-border);
      overflow-y: auto;
      background: var(--sidebar-bg);
      padding: var(--sidebar-padding);
      z-index: 15;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .word-item {
      padding: 10px 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.2;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .word-item:hover {
      background: var(--list-hover-bg);
    }

    .word-item.active {
      background: var(--list-active-bg);
      font-weight: bold;
    }

    .word-label {
      min-width: 0;
      flex: 1;
      word-break: break-word;
    }

    .item-star {
      flex-shrink: 0;
      color: var(--accent);
      font-size: 14px;
      line-height: 1;
      opacity: 0.95;
    }

    .main {
      position: absolute;
      top: var(--header-offset);
      left: 0;
      width: 100%;
      height: calc(100vh - var(--header-offset));
      padding: var(--main-padding);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-layout {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .center-box {
      min-width: 0;
      width: 100%;
      max-width: 920px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px 24px;
    }

    .current-vol {
      font-size: 14px;
      color: var(--muted-text);
      letter-spacing: 0.08em;
      margin-top: 0;
    }

    .current-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .favorite-toggle-btn.inline-favorite {
      position: static;
      min-width: 52px;
      padding: 6px 10px;
      font-size: 13px;
      line-height: 1;
    }

    #word {
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #meaning {
      font-size: clamp(22px, 3.4vw, 34px);
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    #pronunciation {
      font-size: clamp(14px, 1.8vw, 20px);
      color: var(--muted-text);
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .button-row {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .nav-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 160px;
    }

    .nav-hint {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
      color: #333;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .main-btn {
      margin-top: 8px;
      font-size: clamp(18px, 2.6vw, 28px);
      padding: 16px 32px;
      border: none;
      border-radius: var(--main-btn-radius);
      background: var(--app-text);
      color: var(--app-bg);
      cursor: pointer;
      transition: 0.15s;
    }

    .main-btn:hover {
      opacity: 0.92;
    }

    .login-btn {
      position: absolute;
      bottom: var(--login-bottom);
      right: var(--login-right);
      z-index: 40;
      font-size: 13px;
      padding: 8px 12px;
    }

    .login-user {
      position: absolute;
      bottom: var(--login-user-bottom);
      left: var(--login-user-left);
      z-index: 40;
      font-size: 12px;
      color: var(--muted-text);
    }

    @media (max-width: 900px) {
      :root {
        --sidebar-width: 110px;
      }
    }

    @media (max-width: 768px) {
      :root {
        --header-top: 10px;
        --header-offset: 60px;
        --sidebar-width: 100px;
        --sidebar-padding: 8px 6px 16px;
        --main-padding: 12px;
        --topbar-width: calc(100vw - 140px);
        --topbar-gap: 6px;
        --vol-font-size: 14px;
        --vol-padding: 8px 12px;
        --vol-min-width: 72px;
        --control-font-size: 13px;
        --control-padding: 8px 12px;
        --toggle-top: 10px;
        --toggle-left: 10px;
        --auto-top: 10px;
        --challenge-top: 52px;
        --random-top: 94px;
        --challenge-right: 10px;
        --random-right: 10px;
      }

      .auto-speak-btn,
      .challenge-btn,
      .random-btn {
        left: auto;
        right: 10px;
        width: 104px;
        text-align: center;
      }

      .favorite-toggle-btn.inline-favorite {
        min-width: 48px;
        padding: 6px 8px;
        font-size: 12px;
      }

      .word-item {
        font-size: 13px;
        padding: 8px 6px;
      }

      .center-box {
        gap: 16px;
        padding: 8px 12px;
      }

      .main-btn {
        padding: 14px 22px;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      :root {
        --login-bottom: 8px;
        --login-right: 8px;
        --login-user-bottom: 10px;
        --login-user-left: 8px;
      }

      .login-btn {
        font-size: 12px;
        padding: 6px 10px;
      }

      .login-user {
        font-size: 11px;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-width: 520px) {
      :root {
        --topbar-width: calc(100vw - 110px);
      }

      .center-box {
        gap: 14px;
      }

      #word {
        font-size: clamp(30px, 8vw, 52px);
      }

      #meaning {
        font-size: clamp(20px, 5vw, 28px);
      }

      .nav-hint {
        font-size: clamp(14px, 3.4vw, 18px);
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --app-bg: #111111;
        --app-text: #eeeeee;
        --muted-text: #bbbbbb;
        --soft-text: #eeeeee;
        --border: #444444;
        --border-strong: #444444;
        --sidebar-border: #333333;
        --sidebar-bg: #1a1a1a;
        --hover-bg: #2a2a2a;
        --list-hover-bg: #2a2a2a;
        --list-active-bg: #333333;
        --btn-bg: #1f1f1f;
        --btn-text: #eeeeee;
        --accent-contrast: #eeeeee;
      }

      .vol-btn.active-vol,
      .favorite-list-btn.active-vol {
        background: #eeeeee;
        color: #111111;
        border-color: #eeeeee;
      }

      .favorite-toggle-btn.active {
        background: var(--btn-bg);
        color: #6aa8ff;
      }

      #word,
      #meaning,
      .nav-hint {
        color: #f5f5f5;
      }

      .main-btn {
        background: #eaeaea;
        color: #111111;
      }
    }
  </style>
</head>
<body class="loading">
  <div class="app">
    <button class="login-btn" id="loginBtn" onclick="signInWithGoogle()">Googleログイン</button>
    <button class="login-btn" id="logoutBtn" onclick="signOutUser()" style="display:none;">ログアウト</button>
    <button class="control-btn toggle-btn" onclick="toggleSidebar()">一覧</button>
    <button class="control-btn auto-speak-btn is-emphasized" id="autoSpeakBtn" onclick="toggleAutoSpeak()">自動発音：OFF</button>
    <button class="control-btn challenge-btn" id="challengeBtn" onclick="toggleChallengeMode()">想起学習</button>
    <button class="control-btn random-btn" id="randomBtn" onclick="toggleRandomMode()">ランダム</button>

    <div class="top-bar">
      <button class="vol-btn" data-vol="vol1" onclick="loadSheet('vol1')">vol.1</button>
      <button class="vol-btn" data-vol="vol2" onclick="loadSheet('vol2')">vol.2</button>
      <button class="vol-btn" data-vol="vol3" onclick="loadSheet('vol3')">vol.3</button>
      <button class="vol-btn" data-vol="vol4" onclick="loadSheet('vol4')">vol.4</button>
      <button class="favorite-list-btn" id="favoriteListBtn" onclick="loadFavoritesMode()">★</button>
    </div>

    <div class="sidebar" id="sidebar">
      <div id="list"></div>
    </div>

    <main class="main">
      <div class="main-layout">
        <div class="center-box">
          <div class="current-row">
            <div class="current-vol" id="current">vol.1</div>
            <button class="control-btn favorite-toggle-btn inline-favorite is-emphasized" id="favoriteToggleBtn" onclick="toggleFavoriteCurrentWord()">☆</button>
          </div>

          <div id="word">読み込み中...</div>
          <div id="meaning"></div>

          <div class="button-row">
            <div class="nav-box">
              <div class="nav-hint" id="prevHint"></div>
              <button class="main-btn" onclick="prevWord()">戻る</button>
            </div>

            <div class="nav-box">
              <div id="pronunciation"></div>
              <button class="main-btn speak-btn" onclick="speakWord()">発音</button>
            </div>

            <div class="nav-box">
              <div class="nav-hint" id="nextHint"></div>
              <button class="main-btn" onclick="nextWord()">進む</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCgVh9fmwib7ox-I1Q9c5IU-B4909XkhkU",
      authDomain: "svl-app-65204.firebaseapp.com",
      projectId: "svl-app-65204",
      storageBucket: "svl-app-65204.firebasestorage.app",
      messagingSenderId: "512772798709",
      appId: "1:512772798709:web:d28cb5154b15fccae26dbc",
      measurementId: "G-XYZMESKJRM"
    };

    const sheetUrls = {
      vol1: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=0",
      vol2: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=1906065075",
      vol3: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=769789994",
      vol4: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=297106222"
    };

    const volOrder = ["vol1", "vol2", "vol3", "vol4"];

    const STORAGE_KEYS = {
      vol: "tango_current_vol",
      indexByVol: "tango_index_by_vol",
      sidebarOpen: "tango_sidebar_open",
      autoSpeak: "tango_auto_speak",
      favorites: "tango_favorites",
      challengeMode: "tango_challenge_mode",
      randomMode: "tango_random_mode"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const provider = new GoogleAuthProvider();

    const listEl = document.getElementById("list");
    const sidebarEl = document.getElementById("sidebar");
    const wordEl = document.getElementById("word");
    const meaningEl = document.getElementById("meaning");
    const pronunciationEl = document.getElementById("pronunciation");
    const prevHintEl = document.getElementById("prevHint");
    const nextHintEl = document.getElementById("nextHint");
    const currentEl = document.getElementById("current");
    const favoriteToggleBtnEl = document.getElementById("favoriteToggleBtn");
    const favoriteListBtnEl = document.getElementById("favoriteListBtn");
    const autoSpeakBtnEl = document.getElementById("autoSpeakBtn");
    const challengeBtnEl = document.getElementById("challengeBtn");
    const randomBtnEl = document.getElementById("randomBtn");
    const loginBtnEl = document.getElementById("loginBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");

    let currentUser = null;
    let allWordsByVol = {
      vol1: [],
      vol2: [],
      vol3: [],
      vol4: []
    };

    let words = [];
    let index = 0;
    let currentVol = "vol1";
    let currentMode = "vol";
    let sidebarOpen = true;
    let autoSpeak = false;
    let favorites = {};
    let challengeMode = false;
    let randomMode = false;
    let meaningRevealTimer = null;
    let autoSpeakTimer = null;
    let shuffledWords = [];
    let lastPronunciationRequest = "";
    let currentPronunciationController = null;
    let hasFinishedInitialLoading = false;
    let listNeedsRebuild = true;
    let renderedListKey = "";

    let indexByVol = {
      vol1: 0,
      vol2: 0,
      vol3: 0,
      vol4: 0,
      favorites: 0
    };

    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;
    let lastTouchEnd = 0;
    let swipeEnabled = false;

    function init() {
      loadSavedState();
      bindTouchEvents();
      setupAuthListener();
      loadSheet(currentVol);
    }

    function finishInitialLoading() {
      if (hasFinishedInitialLoading) return;
      hasFinishedInitialLoading = true;
      document.body.classList.remove("loading");
    }

    function loadSavedState() {
      const savedVol = localStorage.getItem(STORAGE_KEYS.vol);
      const savedSidebarOpen = localStorage.getItem(STORAGE_KEYS.sidebarOpen);
      const savedAutoSpeak = localStorage.getItem(STORAGE_KEYS.autoSpeak);
      const savedIndexByVol = localStorage.getItem(STORAGE_KEYS.indexByVol);
      const savedFavorites = localStorage.getItem(STORAGE_KEYS.favorites);
      const savedChallengeMode = localStorage.getItem(STORAGE_KEYS.challengeMode);
      const savedRandomMode = localStorage.getItem(STORAGE_KEYS.randomMode);

      if (savedVol && sheetUrls[savedVol]) {
        currentVol = savedVol;
      }

      if (savedSidebarOpen !== null) {
        sidebarOpen = savedSidebarOpen === "true";
      }

      if (savedAutoSpeak !== null) {
        autoSpeak = savedAutoSpeak === "true";
      }

      if (savedIndexByVol) {
        try {
          const parsed = JSON.parse(savedIndexByVol);
          indexByVol = { ...indexByVol, ...parsed };
        } catch (error) {
          console.warn("indexByVol restore failed", error);
        }
      }

      if (savedFavorites) {
        try {
          const parsedFavorites = JSON.parse(savedFavorites);
          favorites = parsedFavorites && typeof parsedFavorites === "object" ? parsedFavorites : {};
        } catch (error) {
          favorites = {};
        }
      }

      if (savedChallengeMode !== null) {
        challengeMode = savedChallengeMode === "true";
      }

      if (savedRandomMode !== null) {
        randomMode = savedRandomMode === "true";
      }

      updateAutoSpeakButton();
      updateChallengeButton();
      updateRandomButton();
      applySidebarState();
    }

    function bindTouchEvents() {
      document.addEventListener(
        "touchstart",
        (event) => {
          const touch = event.changedTouches[0];
          if (!touch) return;

          const startTarget = event.target instanceof Element ? event.target : null;
          swipeEnabled = isSwipeAllowedTarget(startTarget);
          touchStartX = touch.screenX;
          touchStartY = touch.screenY;
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        (event) => {
          const touch = event.changedTouches[0];
          if (!touch) return;

          touchEndX = touch.screenX;
          touchEndY = touch.screenY;

          if (swipeEnabled) {
            handleSwipe();
          }

          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
          swipeEnabled = false;
        },
        { passive: false }
      );
    }

    function isSwipeAllowedTarget(target) {
      if (!(target instanceof Element)) return true;
      if (target.closest("button, a, input, textarea, select, label")) return false;
      if (target.closest("#sidebar")) return false;
      return true;
    }

    async function signInWithGoogle() {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Googleログイン失敗:", error);
        alert("ログインに失敗しました。");
      }
    }

    async function signOutUser() {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("ログアウト失敗:", error);
        alert("ログアウトに失敗しました。");
      }
    }

    function setupAuthListener() {
      onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        updateAuthUI();

        if (!user) {
          return;
        }

        await loadFavoritesFromCloud();
        requestListRebuild();
        render();
      });
    }

    function updateAuthUI() {
      if (!loginBtnEl || !logoutBtnEl) return;

      if (currentUser) {
        loginBtnEl.style.display = "none";
        logoutBtnEl.style.display = "inline-block";
      } else {
        loginBtnEl.style.display = "inline-block";
        logoutBtnEl.style.display = "none";
      }
    }

    function saveCurrentVol() {
      localStorage.setItem(STORAGE_KEYS.vol, currentVol);
    }

    function saveIndexByVol() {
      localStorage.setItem(STORAGE_KEYS.indexByVol, JSON.stringify(indexByVol));
    }

    function saveSidebarState() {
      localStorage.setItem(STORAGE_KEYS.sidebarOpen, String(sidebarOpen));
    }

    function saveAutoSpeakState() {
      localStorage.setItem(STORAGE_KEYS.autoSpeak, String(autoSpeak));
    }

    function saveFavoritesToLocalOnly() {
      localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(favorites));
    }

    function saveChallengeModeState() {
      localStorage.setItem(STORAGE_KEYS.challengeMode, String(challengeMode));
    }

    function saveRandomModeState() {
      localStorage.setItem(STORAGE_KEYS.randomMode, String(randomMode));
    }

    async function loadFavoritesFromCloud() {
      if (!currentUser) return;

      try {
        const ref = doc(db, "users", currentUser.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          if (Object.keys(favorites).length > 0) {
            await setDoc(ref, { favorites }, { merge: true });
          }
          return;
        }

        const data = snap.data();
        const cloudFavorites =
          data && data.favorites && typeof data.favorites === "object"
            ? data.favorites
            : {};

        favorites = {
          ...cloudFavorites,
          ...favorites
        };

        saveFavoritesToLocalOnly();
        await setDoc(ref, { favorites }, { merge: true });
      } catch (error) {
        console.error("クラウド読み込み失敗:", error);
      }
    }

    async function saveFavoritesToCloud() {
      if (!currentUser) return;

      try {
        const ref = doc(db, "users", currentUser.uid);
        await setDoc(ref, { favorites }, { merge: true });
      } catch (error) {
        console.error("クラウド保存失敗:", error);
      }
    }

    async function fetchWordsForVol(volName) {
      const response = await fetch(sheetUrls[volName]);
      const text = await response.text();
      return parseCsvToWords(text, volName);
    }

    async function ensureVolLoaded(volName) {
      if (!allWordsByVol[volName] || allWordsByVol[volName].length === 0) {
        allWordsByVol[volName] = await fetchWordsForVol(volName);
      }
    }

    async function loadSheet(volName) {
      try {
        currentMode = "vol";
        currentVol = volName;
        shuffledWords = [];
        saveCurrentVol();

        await ensureVolLoaded(volName);

        applyWordOrder(false);
        index = Math.min(indexByVol[volName] || 0, Math.max(words.length - 1, 0));
        requestListRebuild();
        render();
        finishInitialLoading();
      } catch (error) {
        console.error(error);
        finishInitialLoading();
        alert("読み込みに失敗しました。スプレッドシートの共有設定をご確認ください。");
      }
    }

    async function ensureAllVolumesLoaded() {
      for (const vol of volOrder) {
        await ensureVolLoaded(vol);
      }
    }

    function parseCsvToWords(text, volName) {
      return text
        .trim()
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const cols = line.split(",");
          const word = (cols.shift() || "").trim();
          let meaning = cols.join(",").trim();
          meaning = meaning.replace(/,+$/, "");

          return {
            word,
            meaning,
            sourceVol: volName
          };
        })
        .filter((item) => item.word);
    }

    async function loadPronunciation(word) {
      const normalizedWord = String(word).toLowerCase().trim();
      const key = `pron_${normalizedWord}`;
      if (!pronunciationEl) return;

      lastPronunciationRequest = normalizedWord;

      const cached = localStorage.getItem(key);
      if (cached !== null) {
        if (lastPronunciationRequest === normalizedWord) {
          pronunciationEl.textContent = cached;
        }
        return;
      }

      if (currentPronunciationController) {
        currentPronunciationController.abort();
      }

      currentPronunciationController = new AbortController();
      pronunciationEl.textContent = "";

      try {
        const response = await fetch(
          `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`,
          { signal: currentPronunciationController.signal }
        );
        const data = await response.json();

        let phonetic = "";

        if (Array.isArray(data) && data[0]) {
          if (data[0].phonetic) {
            phonetic = data[0].phonetic;
          } else if (Array.isArray(data[0].phonetics)) {
            const found = data[0].phonetics.find((item) => item && item.text);
            phonetic = found ? found.text : "";
          }
        }

        phonetic = phonetic.replace(/^\/|\/$/g, "");

        if (phonetic) {
          localStorage.setItem(key, phonetic);
        }

        const current = getCurrentWord();
        const currentWord = current ? String(current.word).toLowerCase().trim() : "";
        if (lastPronunciationRequest === normalizedWord && currentWord === normalizedWord) {
          pronunciationEl.textContent = phonetic;
        }
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        const current = getCurrentWord();
        const currentWord = current ? String(current.word).toLowerCase().trim() : "";
        if (lastPronunciationRequest === normalizedWord && currentWord === normalizedWord) {
          pronunciationEl.textContent = "";
        }
      }
    }

    function makeFavoriteKey(vol, word) {
      return `${vol}::${String(word).toLowerCase().trim()}`;
    }

    function isFavorite(vol, word) {
      return !!favorites[makeFavoriteKey(vol, word)];
    }

    function buildFavoriteEntries() {
      const entries = [];

      volOrder.forEach((vol) => {
        const source = allWordsByVol[vol] || [];
        source.forEach((item) => {
          if (isFavorite(vol, item.word)) {
            entries.push({
              ...item,
              sourceVol: vol
            });
          }
        });
      });

      return entries;
    }

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function applyWordOrder(resetIndex = false) {
      const baseWords =
        currentMode === "favorites"
          ? buildFavoriteEntries()
          : [...(allWordsByVol[currentVol] || [])];

      if (randomMode) {
        if (shuffledWords.length === 0) {
          shuffledWords = shuffleArray(baseWords);
        }
        words = shuffledWords;
      } else {
        shuffledWords = [];
        words = baseWords;
      }

      if (resetIndex) {
        index = 0;
      } else {
        index = Math.min(index, Math.max(words.length - 1, 0));
      }
    }

    function requestListRebuild() {
      listNeedsRebuild = true;
      renderedListKey = "";
    }

    function getListRenderKey() {
      const wordsKey = words
        .map((item) => `${item.sourceVol}:${item.word}:${isFavorite(item.sourceVol, item.word) ? 1 : 0}`)
        .join("|");
      return `${currentMode}__${currentVol}__${randomMode ? 1 : 0}__${wordsKey}`;
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      saveSidebarState();
      applySidebarState();
    }

    function toggleAutoSpeak() {
      autoSpeak = !autoSpeak;
      saveAutoSpeakState();
      updateAutoSpeakButton();

      if (!autoSpeak) {
        clearAutoSpeakTimer();
      }
    }

    function toggleChallengeMode() {
      challengeMode = !challengeMode;
      saveChallengeModeState();
      updateChallengeButton();
      renderCurrentWord();
    }

    function toggleRandomMode() {
      randomMode = !randomMode;
      saveRandomModeState();
      updateRandomButton();
      applyWordOrder(true);
      requestListRebuild();
      render();
    }

    function toggleFavoriteCurrentWord() {
      const current = getCurrentWord();
      if (!current || !current.sourceVol) return;

      const key = makeFavoriteKey(current.sourceVol, current.word);

      if (favorites[key]) {
        delete favorites[key];
      } else {
        favorites[key] = true;
      }

      saveFavoritesToLocalOnly();
      updateFavoriteToggleButton();
      requestListRebuild();

      if (currentUser) {
        saveFavoritesToCloud();
      }

      if (currentMode === "favorites") {
        const favoriteEntries = buildFavoriteEntries();

        if (favoriteEntries.length === 0) {
          currentMode = "vol";
          loadSheet(currentVol);
          return;
        }

        applyWordOrder(false);
        index = Math.min(index, words.length - 1);
        indexByVol.favorites = index;
        saveIndexByVol();
      }

      render();
    }

    async function loadFavoritesMode() {
      await ensureAllVolumesLoaded();

      const favoriteEntries = buildFavoriteEntries();
      if (favoriteEntries.length === 0) {
        alert("★未登録");
        return;
      }

      currentMode = "favorites";
      shuffledWords = [];
      applyWordOrder(false);
      index = Math.min(indexByVol.favorites || 0, words.length - 1);
      requestListRebuild();
      render();
    }

    function render() {
      renderList();
      renderCurrentWord();
      updateCurrentLabel();
      updateTopButtons();
      updateRandomButton();
      applySidebarState();
    }

    function renderList() {
      if (!listEl) return;

      const nextListKey = getListRenderKey();
      if (!listNeedsRebuild && renderedListKey === nextListKey) {
        highlightActiveWord();
        return;
      }

      listEl.innerHTML = "";
      const fragment = document.createDocumentFragment();

      words.forEach((item, itemIndex) => {
        const row = document.createElement("div");
        row.className = "word-item";
        row.dataset.index = String(itemIndex);
        row.onclick = () => {
          index = itemIndex;
          renderCurrentWord();
        };

        const label = document.createElement("span");
        label.className = "word-label";
        label.textContent =
          currentMode === "favorites"
            ? `${item.word} (${item.sourceVol.replace("vol", "vol.")})`
            : item.word;

        row.appendChild(label);

        if (isFavorite(item.sourceVol, item.word)) {
          const star = document.createElement("span");
          star.className = "item-star";
          star.textContent = "★";
          row.appendChild(star);
        }

        fragment.appendChild(row);
      });

      listEl.appendChild(fragment);
      listNeedsRebuild = false;
      renderedListKey = nextListKey;
      highlightActiveWord();
    }

    function renderCurrentWord() {
      clearMeaningRevealTimer();
      clearAutoSpeakTimer();

      const current = getCurrentWord();

      if (!current) {
        if (wordEl) wordEl.textContent = "単語がありません";
        if (meaningEl) meaningEl.textContent = "";
        if (pronunciationEl) pronunciationEl.textContent = "";
        if (prevHintEl) prevHintEl.textContent = "";
        if (nextHintEl) nextHintEl.textContent = "";
        updateFavoriteToggleButton();
        return;
      }

      renderWordText(current);
      updateMeaningDisplay(current.meaning);
      updateCurrentStateMeta();
      loadPronunciation(current.word);
      scheduleAutoSpeak();
    }

    function renderWordText(current) {
      if (wordEl) {
        wordEl.textContent = current.word;
      }
    }

    function updateCurrentStateMeta() {
      persistCurrentIndex();
      highlightActiveWord();
      scrollActiveWordIntoView();
      updateNavHints();
      updateFavoriteToggleButton();
    }

    function persistCurrentIndex() {
      if (currentMode === "vol") {
        indexByVol[currentVol] = index;
      } else {
        indexByVol.favorites = index;
      }
      saveIndexByVol();
    }

    function updateCurrentLabel() {
      if (!currentEl) return;

      if (currentMode === "favorites") {
        currentEl.textContent = "★";
        return;
      }

      const volNumber = currentVol.replace("vol", "");
      currentEl.textContent = `vol.${volNumber}`;
    }

    function updateTopButtons() {
      const volButtons = document.querySelectorAll(".vol-btn");
      volButtons.forEach((button) => {
        const isActive = currentMode === "vol" && button.dataset.vol === currentVol;
        button.classList.toggle("active-vol", isActive);
      });

      if (favoriteListBtnEl) {
        favoriteListBtnEl.classList.toggle("active-vol", currentMode === "favorites");
      }
    }

    function updateFavoriteToggleButton() {
      const current = getCurrentWord();
      if (!favoriteToggleBtnEl || !current) return;

      const active = isFavorite(current.sourceVol, current.word);
      favoriteToggleBtnEl.textContent = active ? "★" : "☆";
      favoriteToggleBtnEl.classList.toggle("active", active);
      favoriteToggleBtnEl.title = active ? "★解除" : "★登録";
    }

    function updateNavHints() {
      if (!prevHintEl || !nextHintEl) return;

      if (!words.length) {
        prevHintEl.textContent = "";
        nextHintEl.textContent = "";
        return;
      }

      const prevIndex = (index - 1 + words.length) % words.length;
      const nextIndex = (index + 1) % words.length;
      const prevItem = words[prevIndex];
      const nextItem = words[nextIndex];

      prevHintEl.textContent = prevItem ? prevItem.word : "";
      nextHintEl.textContent = nextItem ? nextItem.word : "";
    }

    function updateAutoSpeakButton() {
      if (!autoSpeakBtnEl) return;

      autoSpeakBtnEl.textContent = "自動発音";
      autoSpeakBtnEl.classList.toggle("active", autoSpeak);
      autoSpeakBtnEl.classList.toggle("active-blue", autoSpeak);
    }

    function updateChallengeButton() {
      if (!challengeBtnEl) return;

      challengeBtnEl.textContent = "想起学習";
      challengeBtnEl.classList.toggle("active", challengeMode);
      challengeBtnEl.classList.toggle("active-blue", challengeMode);
    }

    function updateRandomButton() {
      if (!randomBtnEl) return;

      randomBtnEl.textContent = "ランダム";
      randomBtnEl.classList.toggle("active", randomMode);
      randomBtnEl.classList.toggle("active-blue", randomMode);
    }

    function updateMeaningDisplay(meaning) {
      if (!meaningEl) return;

      clearMeaningRevealTimer();

      if (!challengeMode) {
        meaningEl.textContent = meaning;
        return;
      }

      meaningEl.textContent = "・・・";
      meaningRevealTimer = setTimeout(() => {
        meaningEl.textContent = meaning;
      }, 1500);
    }

    function highlightActiveWord() {
      const items = document.querySelectorAll(".word-item");
      items.forEach((item, itemIndex) => {
        item.classList.toggle("active", itemIndex === index);
      });
    }

    function scrollActiveWordIntoView() {
      const items = document.querySelectorAll(".word-item");
      const active = items[index];

      if (active) {
        active.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    function applySidebarState() {
      if (!sidebarEl) return;
      sidebarEl.classList.toggle("hidden", !sidebarOpen);
    }

    function clearMeaningRevealTimer() {
      if (meaningRevealTimer) {
        clearTimeout(meaningRevealTimer);
        meaningRevealTimer = null;
      }
    }

    function clearAutoSpeakTimer() {
      if (autoSpeakTimer) {
        clearTimeout(autoSpeakTimer);
        autoSpeakTimer = null;
      }
    }

    function scheduleAutoSpeak() {
      if (!autoSpeak) return;

      autoSpeakTimer = setTimeout(() => {
        speakWord();
      }, 150);
    }

    function getCurrentWord() {
      return words[index] || null;
    }

    function prevWord() {
      if (!words.length) return;
      index = (index - 1 + words.length) % words.length;
      renderCurrentWord();
    }

    function nextWord() {
      if (!words.length) return;
      index = (index + 1) % words.length;
      renderCurrentWord();
    }

    function speakWord() {
      const current = getCurrentWord();
      if (!current) return;

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(current.word);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      speechSynthesis.speak(utterance);
    }

    function handleSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = Math.abs(touchEndY - touchStartY);
      const thresholdX = 50;
      const thresholdY = 50;

      if (Math.abs(diffX) < thresholdX) return;
      if (diffY > thresholdY) return;

      if (diffX > 0) {
        prevWord();
      } else {
        nextWord();
      }
    }

    window.signInWithGoogle = signInWithGoogle;
    window.signOutUser = signOutUser;
    window.toggleSidebar = toggleSidebar;
    window.toggleAutoSpeak = toggleAutoSpeak;
    window.toggleFavoriteCurrentWord = toggleFavoriteCurrentWord;
    window.toggleChallengeMode = toggleChallengeMode;
    window.loadSheet = loadSheet;
    window.loadFavoritesMode = loadFavoritesMode;
    window.prevWord = prevWord;
    window.nextWord = nextWord;
    window.speakWord = speakWord;
    window.toggleRandomMode = toggleRandomMode;

    try {
      init();
    } catch (error) {
      console.error("初期化失敗:", error);
      finishInitialLoading();
      alert("初期化失敗: " + error.message);
    }
  </script>
</body>
