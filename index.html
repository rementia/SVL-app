<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png">
  <link rel="apple-touch-icon" href="SVL_icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * {
      box-sizing: border-box;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    button, .word-item {
      touch-action: manipulation;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      overflow: hidden;
    }

    html, body {
      touch-action: manipulation;
      overflow: hidden;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #ffffff;
      color: #111;
    }
    #rotateNotice {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .rotate-box {
    font-size: 22px;
    color: #333;
    text-align: center;
    padding: 24px;
  }

    body.loading {
      visibility: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: min(92vw, 700px);
      padding: 0 8px;
    }

    .vol-btn {
      font-size: 16px;
      padding: 10px 18px;
      border: 1px solid #bbb;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      min-width: 84px;
      transition: 0.15s;
    }

    .vol-btn:hover {
      background: #f2f2f2;
    }

    .vol-btn.active-vol {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .toggle-btn {
      position: absolute;
      top: 14px;
      left: 12px;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #f2f2f2;
    }

    .sidebar {
      position: absolute;
      top: 70px;
      left: 0;
      width: 140px;
      height: calc(100vh - 70px);
      border-right: 1px solid #ddd;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px 8px 20px;
      z-index: 15;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .word-item {
      padding: 10px 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.2;
      word-break: break-word;
    }

    .word-item:hover {
      background: #ececec;
    }

    .word-item.active {
      background: #dcdcdc;
      font-weight: bold;
    }

    .main {
      position: absolute;
      top: 70px;
      left: 140px;
      width: calc(100% - 140px);
      height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      transition: left 0.25s ease, width 0.25s ease;
    }

    .main.full {
      left: 0;
      width: 100%;
    }

    .center-box {
      width: min(92vw, 920px);
      max-width: 920px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px;
    }

    .current-vol {
      font-size: 14px;
      color: #666;
      letter-spacing: 0.08em;
      margin-top: 10px;
    }

    #word {
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #meaning {
      font-size: clamp(22px, 3.4vw, 34px);
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    #image {
      font-size: clamp(16px, 2.2vw, 22px);
      color: #666;
      line-height: 1.6;
      max-width: min(92%, 760px);
      word-break: break-word;
      min-height: 3em;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .main-btn {
      margin-top: 8px;
      font-size: clamp(18px, 2.6vw, 28px);
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      background: #111;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }

    .main-btn:hover {
      opacity: 0.92;
    }

    .sub-btn {
      background: #f3f3f3;
      color: #111;
      border: 1px solid #ccc;
    }

    .sub-btn:hover {
      background: #e9e9e9;
      opacity: 1;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 110px;
      }

      .main {
        left: 110px;
        width: calc(100% - 110px);
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        top: 10px;
        width: calc(100vw - 120px);
        gap: 6px;
      }

      .vol-btn {
        font-size: 14px;
        padding: 8px 12px;
        min-width: 72px;
      }

      .toggle-btn {
        top: 10px;
        left: 10px;
        font-size: 13px;
        padding: 8px 12px;
      }

      .sidebar {
        top: 60px;
        width: 100px;
        height: calc(100vh - 60px);
        padding: 8px 6px 16px;
      }

      .main {
        top: 60px;
        left: 100px;
        width: calc(100% - 100px);
        height: calc(100vh - 60px);
        padding: 12px;
      }

      .word-item {
        font-size: 13px;
        padding: 8px 6px;
      }

      .center-box {
        width: min(96vw, 920px);
        gap: 16px;
      }

      .main-btn {
        padding: 14px 22px;
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        width: calc(100vw - 110px);
      }

      .center-box {
        gap: 14px;
      }

      #word {
        font-size: clamp(30px, 8vw, 52px);
      }

      #meaning {
        font-size: clamp(20px, 5vw, 28px);
      }
    }
  </style>
</head>

<body class="loading">
  <div id="rotateNotice">
    <div class="rotate-box">横向き専用</div>
  </div>
  <div class="app">
    <button class="toggle-btn" onclick="toggleSidebar()">一覧</button>

    <div class="top-bar">
      <button class="vol-btn" onclick="loadSheet('vol1')">vol.1</button>
      <button class="vol-btn" onclick="loadSheet('vol2')">vol.2</button>
      <button class="vol-btn" onclick="loadSheet('vol3')">vol.3</button>
      <button class="vol-btn" onclick="loadSheet('vol4')">vol.4</button>
    </div>

    <div class="sidebar" id="sidebar">
      <div id="list"></div>
    </div>

    <main class="main" id="mainArea">
      <div class="center-box">
        <div class="current-vol" id="current">vol.1</div>
        <div id="word">読み込み中...</div>
        <div id="meaning"></div>
        <div id="image">コアイメージ未生成</div>

        <div class="button-row">
          <button class="main-btn" onclick="prevWord()">戻る</button>
          <button class="main-btn sub-btn" onclick="generateCoreImage()">コアイメージ生成</button>
          <button class="main-btn" onclick="nextWord()">進む</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const sheetUrls = {
      vol1: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=0",
      vol2: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=1906065075",
      vol3: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=769789994",
      vol4: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=297106222"
    };

    const STORAGE_KEYS = {
      vol: "tango_current_vol",
      indexByVol: "tango_index_by_vol",
      sidebarOpen: "tango_sidebar_open"
    };

    let words = [];
    let index = 0;
    let currentVol = "vol1";
    let sidebarOpen = true;
    let indexByVol = {
      vol1: 0,
      vol2: 0,
      vol3: 0,
      vol4: 0
    };

    function checkOrientation() {
      const isPortrait = window.innerHeight > window.innerWidth;
      document.getElementById("rotateNotice").style.display = isPortrait ? "flex" : "none";
    }

    checkOrientation();
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);

    function loadSavedState() {
      const savedVol = localStorage.getItem(STORAGE_KEYS.vol);
      const savedSidebarOpen = localStorage.getItem(STORAGE_KEYS.sidebarOpen);
      const savedIndexByVol = localStorage.getItem(STORAGE_KEYS.indexByVol);

      if (savedVol && sheetUrls[savedVol]) {
        currentVol = savedVol;
      }

      if (savedSidebarOpen !== null) {
        sidebarOpen = savedSidebarOpen === "true";
      }

      if (savedIndexByVol) {
        try {
          const parsed = JSON.parse(savedIndexByVol);
          indexByVol = { ...indexByVol, ...parsed };
        } catch (e) {}
      }
    }

    function saveCurrentVol() {
      localStorage.setItem(STORAGE_KEYS.vol, currentVol);
    }

    function saveIndexByVol() {
      localStorage.setItem(STORAGE_KEYS.indexByVol, JSON.stringify(indexByVol));
    }

    function saveSidebarState() {
      localStorage.setItem(STORAGE_KEYS.sidebarOpen, String(sidebarOpen));
    }

    async function loadSheet(name) {
      try {
        currentVol = name;
        saveCurrentVol();

        const res = await fetch(sheetUrls[name]);
        const text = await res.text();

        const lines = text
          .trim()
          .split("\n")
          .map(line => line.trim())
          .filter(line => line !== "");

        words = lines.map(line => {
          const [word, meaning] = line.split(",");
          return {
            word: (word || "").trim(),
            meaning: (meaning || "").trim()
          };
        }).filter(item => item.word);

        index = indexByVol[name] || 0;
        if (index >= words.length) index = 0;

        createList();
        showWord();
        updateCurrentVol();
        updateVolButtons();
        applySidebarState();

        document.body.classList.remove("loading");
      } catch (e) {
        alert("読み込みに失敗しました。スプレッドシートの共有設定をご確認ください。");
      }
    }

    function getCurrentCacheKey() {
      if (!words.length) return null;
      return "core_" + words[index].word.toLowerCase().trim();
    }

    function showWord() {
      if (!words.length) return;

      const current = words[index];
      document.getElementById("word").textContent = current.word;
      document.getElementById("meaning").textContent = current.meaning;

      const cacheKey = getCurrentCacheKey();
      const cached = cacheKey ? localStorage.getItem(cacheKey) : null;

      if (cached) {
        document.getElementById("image").textContent = cached;
      } else {
        document.getElementById("image").textContent = "コアイメージ未生成";
      }

      indexByVol[currentVol] = index;
      saveIndexByVol();

      highlightActiveWord();
      scrollActiveWordIntoView();
    }

    async function generateCoreImage() {
      if (!words.length) return;

      const current = words[index];
      const cacheKey = getCurrentCacheKey();
      if (!cacheKey) return;

      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        document.getElementById("image").textContent = cached;
        return;
      }

      document.getElementById("image").textContent = "コアイメージ生成中...";

      try {
        const res = await fetch("http://localhost:3001/api/core-image", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ word: current.word })
        });

        const data = await res.json();
        const result = data.result || "コアイメージを取得できませんでした。";

        if (
          !result.includes("APIエラー") &&
          !result.includes("失敗") &&
          !result.includes("制限中")
        ) {
          localStorage.setItem(cacheKey, result);
        }

        if (result.includes("APIエラー")) {
          document.getElementById("image").textContent =
            "無料枠制限中。少し待ってから再試行してください。";
        } else {
          document.getElementById("image").textContent = result;
        }
      } catch (e) {
        console.error("core-image error:", e);
        document.getElementById("image").textContent = "コアイメージ取得失敗";
      }
    }

    function prevWord() {
  if (!words.length) return;
  index = (index - 1 + words.length) % words.length;
  showWord();
}

    function nextWord() {
      if (!words.length) return;
      index = (index + 1) % words.length;
      showWord();
    }

    function createList() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      words.forEach((w, i) => {
        const div = document.createElement("div");
        div.className = "word-item";
        div.textContent = w.word;
        div.onclick = () => {
          index = i;
          showWord();
        };
        list.appendChild(div);
      });
    }

    function highlightActiveWord() {
      const items = document.querySelectorAll(".word-item");
      items.forEach((item, i) => {
        item.classList.toggle("active", i === index);
      });
    }

    function scrollActiveWordIntoView() {
      const items = document.querySelectorAll(".word-item");
      const active = items[index];
      if (active) {
        active.scrollIntoView({ block: "nearest" });
      }
    }

    function updateCurrentVol() {
      const volNumber = currentVol.replace("vol", "");
      document.getElementById("current").textContent = "vol." + volNumber;
    }

    function updateVolButtons() {
      const buttons = document.querySelectorAll(".vol-btn");
      buttons.forEach(btn => btn.classList.remove("active-vol"));

      const mapping = {
        vol1: 0,
        vol2: 1,
        vol3: 2,
        vol4: 3
      };

      const activeIndex = mapping[currentVol];
      if (buttons[activeIndex]) {
        buttons[activeIndex].classList.add("active-vol");
      }
    }

    function applySidebarState() {
      const sidebar = document.getElementById("sidebar");
      const mainArea = document.getElementById("mainArea");

      if (sidebarOpen) {
        sidebar.classList.remove("hidden");
        mainArea.classList.remove("full");
      } else {
        sidebar.classList.add("hidden");
        mainArea.classList.add("full");
      }
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      saveSidebarState();
      applySidebarState();
    }

    loadSavedState();
    loadSheet(currentVol);
    let lastTouchEnd = 0;
    
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
</body>
</html>
