<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png" />
  <link rel="apple-touch-icon" href="SVL_icon.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      touch-action: manipulation;
      overflow: hidden;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #ffffff;
      color: #111;
    }

    button,
    .word-item {
      touch-action: manipulation;
    }

    body.loading {
      visibility: hidden;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: min(92vw, 860px);
      padding: 0 8px;
    }

    .vol-btn,
    .favorite-list-btn {
      font-size: 16px;
      padding: 10px 18px;
      border: 1px solid #bbb;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      min-width: 84px;
      transition: 0.15s;
    }

    .vol-btn:hover,
    .favorite-list-btn:hover {
      background: #f2f2f2;
    }

    .vol-btn.active-vol,
    .favorite-list-btn.active-vol {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .toggle-btn,
    .auto-speak-btn,
    .favorite-toggle-btn {
      position: absolute;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      min-width: 56px;
      font-weight: 700;
      color: #888;
    }

    .toggle-btn:hover,
    .auto-speak-btn:hover,
    .favorite-toggle-btn:hover {
      background: #f2f2f2;
    }

    .toggle-btn {
      top: 14px;
      left: 12px;
    }

    .auto-speak-btn {
      top: 14px;
      left: 96px;
    }

    .favorite-toggle-btn {
      min-width: 56px;
      font-weight: 700;
      color: #888;
    }

    .auto-speak-btn.active {
      background: #2f7df6;
      color: #fff;
      border-color: #444;
    }

    .favorite-toggle-btn.active {
      background: #fff;
      color: #2f7df6;
      border-color: #444;
    }

    .speak-btn {
      background: #2f7df6;
    }

    .speak-btn:hover {
      opacity: 0.9;
    }

    .sidebar {
      position: absolute;
      top: 70px;
      left: 0;
      width: 150px;
      height: calc(100vh - 70px);
      border-right: 1px solid #ddd;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px 8px 20px;
      z-index: 15;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .word-item {
      padding: 10px 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.2;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .word-item:hover {
      background: #ececec;
    }

    .word-item.active {
      background: #dcdcdc;
      font-weight: bold;
    }

    .word-label {
      min-width: 0;
      flex: 1;
      word-break: break-word;
    }

    .item-star {
      flex-shrink: 0;
      color: #2f7df6;
      font-size: 14px;
      line-height: 1;
      opacity: 0.95;
    }

    .main {
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      height: calc(100vh - 70px);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-layout {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .center-box {
      min-width: 0;
      width: 100%;
      max-width: 920px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-box);
      padding: var(--space-center-padding);
    }

    .current-vol {
      font-size: 14px;
      color: #666;
      letter-spacing: 0.08em;
      margin-top: 0;
    }

    .current-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-current-row);
      margin-top: 10px;
    }

    .favorite-toggle-btn.inline-favorite {
      position: static;
      min-width: 52px;
      padding: 6px 10px;
      font-size: 13px;
      line-height: 1;
    }

    #word {
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #meaning {
      font-size: clamp(22px, 3.4vw, 34px);
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    #pronunciation {
      font-size: clamp(14px, 1.8vw, 20px);
      color: #666;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .button-row {
      display: flex;
      gap: var(--space-row);
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .nav-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-nav);
      min-width: 160px;
    }

    .nav-hint {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
      color: #333;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .main-btn {
      margin-top: 8px;
      font-size: clamp(18px, 2.6vw, 28px);
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      background: #111;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }

    .main-btn:hover {
      opacity: 0.92;
    }

    .challenge-btn {
      position: absolute;
      top: 14px;
      right: 100px;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .challenge-btn.active {
      background: #2f7df6;
      color: #fff;
      border-color: #444;
    }

    .random-btn {
      position: absolute;
      top: 14px;
      right: 200px;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .random-btn.active {
      background: #2f7df6;
      color: #fff;
      border-color: #444;
    }

    .login-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 40;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    #logoutBtn {
      right: 12px;
    }

    .login-user {
      position: absolute;
      bottom: 14px;
      left: 12px;
      z-index: 40;
      font-size: 12px;
      color: #666;
    }

    .auto-speak-btn.active,
    .challenge-btn.active,
    .random-btn.active {
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 110px;
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        top: 10px;
        width: calc(100vw - 140px);
        gap: 6px;
      }

      .vol-btn,
      .favorite-list-btn {
        font-size: 14px;
        padding: 8px 12px;
        min-width: 72px;
      }

      .toggle-btn,
      .auto-speak-btn,
      .favorite-toggle-btn,
      .challenge-btn,
      .random-btn {
        font-size: 13px;
        padding: 8px 12px;
      }

      .toggle-btn {
        top: 10px;
        left: 10px;
      }

      .auto-speak-btn {
        top: 10px;
        right: 10px;
        left: auto;
        width: 104px;
        text-align: center;
      }

      .challenge-btn {
        top: 52px;
        right: 10px;
        left: auto;
        width: 104px;
        text-align: center;
      }

      .random-btn {
        top: 94px;
        right: 10px;
        left: auto;
        width: 104px;
        text-align: center;
      }

      .favorite-toggle-btn.inline-favorite {
        min-width: 48px;
        padding: 6px 8px;
        font-size: 12px;
      }

      .sidebar {
        top: 60px;
        width: 100px;
        height: calc(100vh - 60px);
        padding: 8px 6px 16px;
      }

      .main {
        top: 60px;
        height: calc(100vh - 60px);
        padding: 12px;
      }

      .word-item {
        font-size: 13px;
        padding: 8px 6px;
      }

      .main-btn {
        padding: 14px 22px;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      .login-btn {
        bottom: 8px;
        font-size: 12px;
        padding: 6px 10px;
      }

      #loginBtn {
        right: 8px;
      }

      #logoutBtn {
        right: 8px;
      }

      .login-user {
        bottom: 10px;
        left: 8px;
        font-size: 11px;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        width: calc(100vw - 110px);
      }

      .center-box {
        gap: 14px;
      }

      #word {
        font-size: clamp(30px, 8vw, 52px);
      }

      #meaning {
        font-size: clamp(20px, 5vw, 28px);
      }

      .nav-hint {
        font-size: clamp(14px, 3.4vw, 18px);
      }
    }

    @media (prefers-color-scheme: dark) {
      html,
      body {
        background: #111;
        color: #eee;
      }

      .app {
        background: #111;
      }

      .sidebar {
        background: #1a1a1a;
        border-right: 1px solid #333;
      }

      .word-item:hover {
        background: #2a2a2a;
      }

      .word-item.active {
        background: #333;
        color: #fff;
      }

      .vol-btn,
      .favorite-list-btn,
      .toggle-btn,
      .auto-speak-btn,
      .favorite-toggle-btn {
        background: #1f1f1f;
        color: #eee;
        border-color: #444;
      }

      .vol-btn:hover,
      .favorite-list-btn:hover,
      .toggle-btn:hover,
      .auto-speak-btn:hover,
      .favorite-toggle-btn:hover {
        background: #2a2a2a;
      }

      .vol-btn.active-vol,
      .favorite-list-btn.active-vol {
        background: #eee;
        color: #111;
        border-color: #eee;
      }

      .favorite-toggle-btn.active {
        background: #1f1f1f;
        color: #6aa8ff;
        border-color: #444;
      }

      .current-vol,
      #pronunciation {
        color: #bbb;
      }

      #word,
      #meaning,
      .nav-hint {
        color: #f5f5f5;
      }

      .main-btn {
        background: #eaeaea;
        color: #111;
      }
      
      .auto-speak-btn.active {
        background: #2f7df6;
        color: #eee;
        border-color: #444;
      }
      
      .challenge-btn.active {
        background: #2f7df6;
        color: #eee;
        border-color: #444;
      }

      .random-btn {
        background: #1f1f1f;
        color: #eee;
        border-color: #444;
      }

      .random-btn.active {
        background: #2f7df6;
        color: #eee;
        border-color: #444;
      }

      .login-btn {
        background: #1f1f1f;
        color: #eee;
        border-color: #444;
      }

      .login-user {
        color: #bbb;
      }

    }
  </style>
</head>
<body class="loading">
  <div class="app">
    <button class="login-btn" id="loginBtn" onclick="signInWithGoogle()" aria-label="Googleでログイン">Googleログイン</button>
    <button class="login-btn" id="logoutBtn" onclick="signOutUser()" style="display:none;" aria-label="ログアウト">ログアウト</button>
    <button class="toggle-btn" id="toggleSidebarBtn" onclick="toggleSidebar()" aria-label="一覧を開閉" aria-controls="sidebar" aria-expanded="true">一覧</button>
    <button class="auto-speak-btn" id="autoSpeakBtn" onclick="toggleAutoSpeak()" aria-label="自動発音" aria-pressed="false">自動発音：OFF</button>
    <button class="challenge-btn" id="challengeBtn" onclick="toggleChallengeMode()" aria-label="想起学習" aria-pressed="false">想起学習</button>
    <button class="random-btn" id="randomBtn" onclick="toggleRandomMode()" aria-label="ランダム" aria-pressed="false">ランダム</button>

    <div class="top-bar">
      <button class="vol-btn" data-vol="vol1" onclick="loadSheet('vol1')">vol.1</button>
      <button class="vol-btn" data-vol="vol2" onclick="loadSheet('vol2')">vol.2</button>
      <button class="vol-btn" data-vol="vol3" onclick="loadSheet('vol3')">vol.3</button>
      <button class="vol-btn" data-vol="vol4" onclick="loadSheet('vol4')">vol.4</button>
      <button class="favorite-list-btn" id="favoriteListBtn" onclick="loadFavoritesMode()" aria-label="お気に入り一覧を表示">★</button>
    </div>

    <div class="sidebar" id="sidebar" role="listbox" aria-label="単語一覧">
      <div id="list"></div>
    </div>

    <main class="main">
      <div class="main-layout">
        <div class="center-box">
          <div class="current-row">
            <div class="current-vol" id="current" aria-live="polite">vol.1</div>
            <button class="favorite-toggle-btn inline-favorite" id="favoriteToggleBtn" onclick="toggleFavoriteCurrentWord()" aria-label="現在の単語をお気に入り登録" aria-pressed="false">☆</button>
          </div>

          <div id="word" aria-live="polite">読み込み中...</div>
          <div id="meaning" aria-live="polite"></div>

          <div class="button-row">
            <div class="nav-box">
              <div class="nav-hint" id="prevHint"></div>
              <button class="main-btn" onclick="prevWord()" aria-label="前の単語へ戻る">戻る</button>
            </div>

            <div class="nav-box">
              <div id="pronunciation" aria-live="polite"></div>
              <button class="main-btn speak-btn" onclick="speakWord()" aria-label="現在の単語を発音">発音</button>
            </div>

            <div class="nav-box">
                <div class="nav-hint" id="nextHint"></div>
              <button class="main-btn" onclick="nextWord()" aria-label="次の単語へ進む">進む</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // =========================
    // Constants
    // =========================
    const firebaseConfig = {
      apiKey: "AIzaSyCgVh9fmwib7ox-I1Q9c5IU-B4909XkhkU",
      authDomain: "svl-app-65204.firebaseapp.com",
      projectId: "svl-app-65204",
      storageBucket: "svl-app-65204.firebasestorage.app",
      messagingSenderId: "512772798709",
      appId: "1:512772798709:web:d28cb5154b15fccae26dbc",
      measurementId: "G-XYZMESKJRM"
    };

    const sheetUrls = {
      vol1: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=0",
      vol2: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=1906065075",
      vol3: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=769789994",
      vol4: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=297106222"
    };

    const volOrder = ["vol1", "vol2", "vol3", "vol4"];

    const STORAGE_KEYS = {
      vol: "tango_current_vol",
      indexByVol: "tango_index_by_vol",
      sidebarOpen: "tango_sidebar_open",
      autoSpeak: "tango_auto_speak",
      favorites: "tango_favorites",
      challengeMode: "tango_challenge_mode",
      randomMode: "tango_random_mode"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const provider = new GoogleAuthProvider();

    // =========================
    // App state
    // =========================
    let currentUser = null;
    let syncReady = false;

    let allWordsByVol = {
      vol1: [],
      vol2: [],
      vol3: [],
      vol4: []
    };

    let words = [];
    let index = 0;
    let currentVol = "vol1";
    let currentMode = "vol"; // 'vol' | 'favorites'
    let sidebarOpen = true;
    let autoSpeak = false;
    let favorites = {};
    let challengeMode = false;
    let randomMode = false;
    let meaningRevealTimer = null;
    let autoSpeakTimer = null;
    let shuffledWords = [];
    let lastPronunciationRequest = "";

    let indexByVol = {
      vol1: 0,
      vol2: 0,
      vol3: 0,
      vol4: 0,
      favorites: 0
    };

    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;
    let lastTouchEnd = 0;

    // =========================
    // Initialization
    // =========================
    function init() {
      loadSavedState();
      bindTouchEvents();
      bindKeyboardShortcuts();
      setupAuthListener();
      loadSheet(currentVol);
    }

    function loadSavedState() {
      const savedVol = localStorage.getItem(STORAGE_KEYS.vol);
      const savedSidebarOpen = localStorage.getItem(STORAGE_KEYS.sidebarOpen);
      const savedAutoSpeak = localStorage.getItem(STORAGE_KEYS.autoSpeak);
      const savedIndexByVol = localStorage.getItem(STORAGE_KEYS.indexByVol);
      const savedFavorites = localStorage.getItem(STORAGE_KEYS.favorites);
      const savedChallengeMode = localStorage.getItem(STORAGE_KEYS.challengeMode);
      const savedRandomMode = localStorage.getItem(STORAGE_KEYS.randomMode);

      if (savedVol && sheetUrls[savedVol]) {
        currentVol = savedVol;
      }

      if (savedSidebarOpen !== null) {
        sidebarOpen = savedSidebarOpen === "true";
      }

      if (savedAutoSpeak !== null) {
        autoSpeak = savedAutoSpeak === "true";
      }

      if (savedIndexByVol) {
        try {
          const parsed = JSON.parse(savedIndexByVol);
          indexByVol = { ...indexByVol, ...parsed };
        } catch (error) {
          console.warn("indexByVol restore failed", error);
        }
      }

      if (savedFavorites) {
        try {
          const parsedFavorites = JSON.parse(savedFavorites);
          favorites = parsedFavorites && typeof parsedFavorites === "object" ? parsedFavorites : {};
        } catch (error) {
          favorites = {};
        }
      } else {
        favorites = {};
      }

      if (savedChallengeMode !== null) {
        challengeMode = savedChallengeMode === "true";
      }

      if (savedRandomMode !== null) {
        randomMode = savedRandomMode === "true";
      }

      updateAutoSpeakButton();
      updateChallengeButton();
      updateRandomButton();
      applySidebarState();
    }

    function bindTouchEvents() {
      document.addEventListener(
        "touchstart",
        (event) => {
          const touch = event.changedTouches[0];
          if (!touch) return;
          touchStartX = touch.screenX;
          touchStartY = touch.screenY;
        },
        { passive: true }
      );

      document.addEventListener(
        "touchend",
        (event) => {
          const touch = event.changedTouches[0];
          if (!touch) return;

          touchEndX = touch.screenX;
          touchEndY = touch.screenY;
          handleSwipe();

          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        },
        { passive: false }
      );
    }

    function bindKeyboardShortcuts() {
      document.addEventListener("keydown", (event) => {
        const target = event.target;
        if (target instanceof HTMLElement) {
          const tagName = target.tagName;
          if (["INPUT", "TEXTAREA", "SELECT", "BUTTON"].includes(tagName)) {
            return;
          }
          if (target.isContentEditable) {
            return;
          }
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          prevWord();
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          nextWord();
        } else if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          toggleFavoriteCurrentWord();
        } else if (event.key.toLowerCase() === "p") {
          event.preventDefault();
          speakWord();
        }
      });
    }

    // =========================
    // Auth
    // =========================
    async function signInWithGoogle() {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Googleログイン失敗:", error);
        alert("ログインに失敗しました。");
      }
    }

    async function signOutUser() {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("ログアウト失敗:", error);
        alert("ログアウトに失敗しました。");
      }
    }

    function setupAuthListener() {
      onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        updateAuthUI();

        if (!user) {
          syncReady = false;
          return;
        }

        await loadFavoritesFromCloud();
        syncReady = true;
        render();
      });
    }

    function updateAuthUI() {
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const toggleBtn = document.getElementById("toggleSidebarBtn");

      if (!loginBtn || !logoutBtn) return;

      if (currentUser) {
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
      } else {
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
      }

      if (toggleBtn) {
        toggleBtn.setAttribute("aria-expanded", String(sidebarOpen));
      }
    }

    // =========================
    // Storage helpers
    // =========================
    function saveCurrentVol() {
      localStorage.setItem(STORAGE_KEYS.vol, currentVol);
    }

    function saveIndexByVol() {
      localStorage.setItem(STORAGE_KEYS.indexByVol, JSON.stringify(indexByVol));
    }

    function saveSidebarState() {
      localStorage.setItem(STORAGE_KEYS.sidebarOpen, String(sidebarOpen));
    }

    function saveAutoSpeakState() {
      localStorage.setItem(STORAGE_KEYS.autoSpeak, String(autoSpeak));
    }

    function saveFavoritesToLocalOnly() {
      localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(favorites));
    }

    function saveChallengeModeState() {
      localStorage.setItem(STORAGE_KEYS.challengeMode, String(challengeMode));
    }

    function saveRandomModeState() {
      localStorage.setItem(STORAGE_KEYS.randomMode, String(randomMode));
    }

    async function loadFavoritesFromCloud() {
      if (!currentUser) return;

      try {
        const ref = doc(db, "users", currentUser.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          if (Object.keys(favorites).length > 0) {
            await setDoc(ref, { favorites }, { merge: true });
          }
          return;
        }

        const data = snap.data();
        const cloudFavorites =
          data && data.favorites && typeof data.favorites === "object"
            ? data.favorites
            : {};

        favorites = {
          ...cloudFavorites,
          ...favorites
        };

        saveFavoritesToLocalOnly();
        await setDoc(ref, { favorites }, { merge: true });
      } catch (error) {
        console.error("クラウド読み込み失敗:", error);
      }
    }

    async function saveFavoritesToCloud() {
      if (!currentUser || !syncReady) return;

      try {
        const ref = doc(db, "users", currentUser.uid);
        await setDoc(ref, { favorites }, { merge: true });
      } catch (error) {
        console.error("クラウド保存失敗:", error);
      }
    }

    // =========================
    // Data loading
    // =========================
    async function fetchWordsForVol(volName) {
      const response = await fetch(sheetUrls[volName]);
      const text = await response.text();
      return parseCsvToWords(text, volName);
    }

    async function ensureVolLoaded(volName) {
      if (!allWordsByVol[volName] || allWordsByVol[volName].length === 0) {
        allWordsByVol[volName] = await fetchWordsForVol(volName);
      }
    }

    async function loadSheet(volName) {
      try {
        currentMode = "vol";
        currentVol = volName;
        shuffledWords = [];
        saveCurrentVol();

        await ensureVolLoaded(volName);

        applyWordOrder(false);
        index = Math.min(indexByVol[volName] || 0, Math.max(words.length - 1, 0));
        render();
        document.body.classList.remove("loading");
      } catch (error) {
        console.error(error);
        document.body.classList.remove("loading");
        alert("読み込みに失敗しました。スプレッドシートの共有設定をご確認ください。");
      }
    }

    async function ensureAllVolumesLoaded() {
      for (const vol of volOrder) {
        await ensureVolLoaded(vol);
      }
    }

    function parseCsvToWords(text, volName) {
      return text
        .trim()
        .split("\n")
        .map((line) => line.replace(/\r/g, "").trim())
        .filter((line) => line !== "")
        .map((line) => {
          const cols = line.split(",");
          const word = (cols.shift() || "").trim();
          let meaning = cols.join(",").trim();
          meaning = meaning.replace(/,+$/, "");

          return {
            word,
            meaning,
            sourceVol: volName
          };
        })
        .filter((item) => item.word);
    }

    async function loadPronunciation(word) {
      const normalizedWord = String(word).toLowerCase().trim();
      const key = `pron_${normalizedWord}`;
      const pronunciationEl = document.getElementById("pronunciation");
      if (!pronunciationEl) return;

      lastPronunciationRequest = normalizedWord;

      const cached = localStorage.getItem(key);
      if (cached !== null) {
        if (lastPronunciationRequest === normalizedWord) {
          pronunciationEl.textContent = cached;
        }
        return;
      }

      pronunciationEl.textContent = "";

      try {
        const response = await fetch(
          `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
        );
        const data = await response.json();

        let phonetic = "";

        if (Array.isArray(data) && data[0]) {
          if (data[0].phonetic) {
            phonetic = data[0].phonetic;
          } else if (Array.isArray(data[0].phonetics)) {
            const found = data[0].phonetics.find((item) => item && item.text);
            phonetic = found ? found.text : "";
          }
        }

        phonetic = phonetic.replace(/^\/|\/$/g, "");
        localStorage.setItem(key, phonetic);

        const current = getCurrentWord();
        const currentWord = current ? String(current.word).toLowerCase().trim() : "";
        if (lastPronunciationRequest === normalizedWord && currentWord === normalizedWord) {
          pronunciationEl.textContent = phonetic;
        }
      } catch (error) {
        localStorage.setItem(key, "");
        const current = getCurrentWord();
        const currentWord = current ? String(current.word).toLowerCase().trim() : "";
        if (lastPronunciationRequest === normalizedWord && currentWord === normalizedWord) {
          pronunciationEl.textContent = "";
        }
      }
    }

    // =========================
    // Favorite helpers
    // =========================
    function makeFavoriteKey(vol, word) {
      return `${vol}::${String(word).toLowerCase().trim()}`;
    }

    function isFavorite(vol, word) {
      return !!favorites[makeFavoriteKey(vol, word)];
    }

    function buildFavoriteEntries() {
      const entries = [];

      volOrder.forEach((vol) => {
        const source = allWordsByVol[vol] || [];
        source.forEach((item) => {
          if (isFavorite(vol, item.word)) {
            entries.push({
              ...item,
              sourceVol: vol
            });
          }
        });
      });

      return entries;
    }

    // =========================
    // State updates
    // =========================
    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function applyWordOrder(resetIndex = false) {
      const baseWords =
        currentMode === "favorites"
          ? buildFavoriteEntries()
          : [...(allWordsByVol[currentVol] || [])];

      if (randomMode) {
        if (shuffledWords.length === 0) {
          shuffledWords = shuffleArray(baseWords);
        }
        words = shuffledWords;
      } else {
        shuffledWords = [];
        words = baseWords;
      }

      if (resetIndex) {
        index = 0;
      } else {
        index = Math.min(index, Math.max(words.length - 1, 0));
      }
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      saveSidebarState();
      applySidebarState();
    }

    function toggleAutoSpeak() {
      autoSpeak = !autoSpeak;
      saveAutoSpeakState();
      updateAutoSpeakButton();

      if (!autoSpeak) {
        clearAutoSpeakTimer();
      }
    }

    function toggleChallengeMode() {
      challengeMode = !challengeMode;
      saveChallengeModeState();
      updateChallengeButton();
      renderCurrentWord();
    }

    function toggleRandomMode() {
      randomMode = !randomMode;
      saveRandomModeState();
      updateRandomButton();
      applyWordOrder(true);
      render();
    }

    function toggleFavoriteCurrentWord() {
      const current = getCurrentWord();
      if (!current || !current.sourceVol) return;

      const key = makeFavoriteKey(current.sourceVol, current.word);

      if (favorites[key]) {
        delete favorites[key];
      } else {
        favorites[key] = true;
      }

      saveFavoritesToLocalOnly();
      updateFavoriteToggleButton();
      renderList();

      if (currentUser) {
        saveFavoritesToCloud();
      }

      if (currentMode === "favorites") {
        const favoriteEntries = buildFavoriteEntries();

        if (favoriteEntries.length === 0) {
          currentMode = "vol";
          loadSheet(currentVol);
          return;
        }

        applyWordOrder(false);
        index = Math.min(index, words.length - 1);
        indexByVol.favorites = index;
        saveIndexByVol();
        render();
      }
    }

    async function loadFavoritesMode() {
      await ensureAllVolumesLoaded();

      const favoriteEntries = buildFavoriteEntries();
      if (favoriteEntries.length === 0) {
        alert("★未登録");
        return;
      }

      currentMode = "favorites";
      shuffledWords = [];
      applyWordOrder(false);
      index = Math.min(indexByVol.favorites || 0, words.length - 1);
      render();
    }

    // =========================
    // Render
    // =========================
    function render() {
      renderList();
      renderCurrentWord();
      updateCurrentLabel();
      updateTopButtons();
      updateRandomButton();
      applySidebarState();
    }

    function renderList() {
      const list = document.getElementById("list");
      if (!list) return;

      list.innerHTML = "";

      words.forEach((item, itemIndex) => {
        const row = document.createElement("div");
        row.className = "word-item";
        row.setAttribute("role", "option");
        row.setAttribute("tabindex", "0");
        row.setAttribute("aria-selected", itemIndex === index ? "true" : "false");
        row.setAttribute("aria-label",
          currentMode === "favorites"
            ? `${item.word} ${item.sourceVol.replace("vol", "vol.")}`
            : item.word
        );
        row.onclick = () => {
          index = itemIndex;
          renderCurrentWord();
        };
        row.onkeydown = (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            index = itemIndex;
            renderCurrentWord();
          }
        };

        const label = document.createElement("span");
        label.className = "word-label";
        label.textContent =
          currentMode === "favorites"
            ? `${item.word} (${item.sourceVol.replace("vol", "vol.")})`
            : item.word;

        row.appendChild(label);

        if (isFavorite(item.sourceVol, item.word)) {
          const star = document.createElement("span");
          star.className = "item-star";
          star.textContent = "★";
          row.appendChild(star);
        }

        list.appendChild(row);
      });

      highlightActiveWord();
    }

    function renderCurrentWord() {
      clearMeaningRevealTimer();
      clearAutoSpeakTimer();

      const current = getCurrentWord();
      const wordEl = document.getElementById("word");
      const meaningEl = document.getElementById("meaning");
      const pronunciationEl = document.getElementById("pronunciation");
      const prevHintEl = document.getElementById("prevHint");
      const nextHintEl = document.getElementById("nextHint");

      if (!current) {
        if (wordEl) wordEl.textContent = "単語がありません";
        if (meaningEl) meaningEl.textContent = "";
        if (pronunciationEl) pronunciationEl.textContent = "";
        if (prevHintEl) prevHintEl.textContent = "";
        if (nextHintEl) nextHintEl.textContent = "";
        updateFavoriteToggleButton();
        return;
      }

      if (wordEl) {
        wordEl.textContent = current.word;
      }

      updateMeaningDisplay(current.meaning);
      persistCurrentIndex();
      highlightActiveWord();
      scrollActiveWordIntoView();
      updateNavHints();
      updateFavoriteToggleButton();
      loadPronunciation(current.word);
      scheduleAutoSpeak();
    }

    function persistCurrentIndex() {
      if (currentMode === "vol") {
        indexByVol[currentVol] = index;
      } else {
        indexByVol.favorites = index;
      }
      saveIndexByVol();
    }

    function updateCurrentLabel() {
      const currentEl = document.getElementById("current");
      if (!currentEl) return;

      if (currentMode === "favorites") {
        currentEl.textContent = "★";
        return;
      }

      const volNumber = currentVol.replace("vol", "");
      currentEl.textContent = `vol.${volNumber}`;
    }

    function updateTopButtons() {
      const volButtons = document.querySelectorAll(".vol-btn");
      volButtons.forEach((button) => {
        const isActive = currentMode === "vol" && button.dataset.vol === currentVol;
        button.classList.toggle("active-vol", isActive);
      });

      const favoriteListBtn = document.getElementById("favoriteListBtn");
      if (favoriteListBtn) {
        favoriteListBtn.classList.toggle("active-vol", currentMode === "favorites");
      }
    }

    function updateFavoriteToggleButton() {
      const button = document.getElementById("favoriteToggleBtn");
      const current = getCurrentWord();

      if (!button) return;

      if (!current) {
        button.setAttribute("aria-pressed", "false");
        button.setAttribute("aria-label", "現在の単語をお気に入り登録");
        return;
      }

      const active = isFavorite(current.sourceVol, current.word);
      button.textContent = active ? "★" : "☆";
      button.classList.toggle("active", active);
      button.title = active ? "★解除" : "★登録";
      button.setAttribute("aria-pressed", String(active));
      button.setAttribute("aria-label", active ? "現在の単語のお気に入り登録を解除" : "現在の単語をお気に入り登録");
    }

    function updateNavHints() {
      const prevHintEl = document.getElementById("prevHint");
      const nextHintEl = document.getElementById("nextHint");
      if (!prevHintEl || !nextHintEl) return;

      if (!words.length) {
        prevHintEl.textContent = "";
        nextHintEl.textContent = "";
        return;
      }

      const prevIndex = (index - 1 + words.length) % words.length;
      const nextIndex = (index + 1) % words.length;
      const prevItem = words[prevIndex];
      const nextItem = words[nextIndex];

      prevHintEl.textContent = prevItem ? prevItem.word : "";
      nextHintEl.textContent = nextItem ? nextItem.word : "";
    }

    function updateAutoSpeakButton() {
      const btn = document.getElementById("autoSpeakBtn");
      if (!btn) return;

      btn.textContent = "自動発音";
      btn.classList.toggle("active", autoSpeak);
      btn.setAttribute("aria-pressed", String(autoSpeak));
    }

    function updateChallengeButton() {
      const btn = document.getElementById("challengeBtn");
      if (!btn) return;

      btn.textContent = "想起学習";
      btn.classList.toggle("active", challengeMode);
      btn.setAttribute("aria-pressed", String(challengeMode));
    }

    function updateRandomButton() {
      const btn = document.getElementById("randomBtn");
      if (!btn) return;

      btn.textContent = "ランダム";
      btn.classList.toggle("active", randomMode);
      btn.setAttribute("aria-pressed", String(randomMode));
    }

    function updateMeaningDisplay(meaning) {
      const el = document.getElementById("meaning");
      if (!el) return;

      clearMeaningRevealTimer();

      if (!challengeMode) {
        el.textContent = meaning;
        return;
      }

      el.textContent = "・・・";
      meaningRevealTimer = setTimeout(() => {
        el.textContent = meaning;
      }, 1500);
    }

    function highlightActiveWord() {
      const items = document.querySelectorAll(".word-item");
      items.forEach((item, itemIndex) => {
        const isActive = itemIndex === index;
        item.classList.toggle("active", isActive);
        item.setAttribute("aria-selected", String(isActive));
      });
    }

    function scrollActiveWordIntoView() {
      const items = document.querySelectorAll(".word-item");
      const active = items[index];

      if (active) {
        active.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    function applySidebarState() {
      const sidebar = document.getElementById("sidebar");
      const toggleBtn = document.getElementById("toggleSidebarBtn");
      if (sidebar) {
        sidebar.classList.toggle("hidden", !sidebarOpen);
      }
      if (toggleBtn) {
        toggleBtn.setAttribute("aria-expanded", String(sidebarOpen));
      }
    }

    // =========================
    // Helpers
    // =========================
    function clearMeaningRevealTimer() {
      if (meaningRevealTimer) {
        clearTimeout(meaningRevealTimer);
        meaningRevealTimer = null;
      }
    }

    function clearAutoSpeakTimer() {
      if (autoSpeakTimer) {
        clearTimeout(autoSpeakTimer);
        autoSpeakTimer = null;
      }
    }

    function scheduleAutoSpeak() {
      if (!autoSpeak) return;

      autoSpeakTimer = setTimeout(() => {
        speakWord();
      }, 150);
    }

    function getCurrentWord() {
      return words[index] || null;
    }

    // =========================
    // Word navigation / speech / swipe
    // =========================
    function prevWord() {
      if (!words.length) return;
      index = (index - 1 + words.length) % words.length;
      renderCurrentWord();
    }

    function nextWord() {
      if (!words.length) return;
      index = (index + 1) % words.length;
      renderCurrentWord();
    }

    function speakWord() {
      const current = getCurrentWord();
      if (!current) return;

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(current.word);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      speechSynthesis.speak(utterance);
    }

    function handleSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = Math.abs(touchEndY - touchStartY);
      const thresholdX = 50;
      const thresholdY = 50;

      if (Math.abs(diffX) < thresholdX) return;
      if (diffY > thresholdY) return;

      if (diffX > 0) {
        prevWord();
      } else {
        nextWord();
      }
    }

    // =========================
    // Public API
    // =========================
    window.signInWithGoogle = signInWithGoogle;
    window.signOutUser = signOutUser;
    window.toggleSidebar = toggleSidebar;
    window.toggleAutoSpeak = toggleAutoSpeak;
    window.toggleFavoriteCurrentWord = toggleFavoriteCurrentWord;
    window.toggleChallengeMode = toggleChallengeMode;
    window.loadSheet = loadSheet;
    window.loadFavoritesMode = loadFavoritesMode;
    window.prevWord = prevWord;
    window.nextWord = nextWord;
    window.speakWord = speakWord;
    window.toggleRandomMode = toggleRandomMode;

    try {
      init();
    } catch (error) {
      console.error("初期化失敗:", error);
      document.body.classList.remove("loading");
      alert("初期化失敗: " + error.message);
    }
  </script>
