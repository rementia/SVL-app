<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png" />
  <link rel="apple-touch-icon" href="SVL_icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="loading">
  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <button class="control-btn toggle-btn" id="toggleSidebarBtn">一覧</button>
      </div>

      <div class="header-center">
        <div class="top-bar">
          <button class="vol-btn" data-vol="vol1">vol.1</button>
          <button class="vol-btn" data-vol="vol2">vol.2</button>
          <button class="vol-btn" data-vol="vol3">vol.3</button>
          <button class="vol-btn" data-vol="vol4">vol.4</button>
          <button class="favorite-list-btn" id="favoriteListBtn">★</button>
        </div>
      </div>

      <div class="header-right">
        <div class="control-stack" aria-label="学習設定">
          <button class="control-btn auto-speak-btn" id="autoSpeakBtn">自動発音</button>
          <button class="control-btn challenge-btn" id="challengeBtn">想起学習</button>
          <button class="control-btn random-btn" id="randomBtn">ランダム</button>
        </div>
      </div>
    </header>

    <button class="login-btn" id="loginBtn">Googleログイン</button>
    <button class="login-btn" id="logoutBtn" style="display:none;">ログアウト</button>

    <div class="sidebar" id="sidebar">
      <div id="list"></div>
    </div>

    <main class="main">
      <div class="main-layout">
        <div class="center-box">
          <div class="current-row">
            <div class="current-vol" id="current">vol.1</div>
            <button class="control-btn favorite-toggle-btn inline-favorite" id="favoriteToggleBtn">☆</button>
          </div>

          <div id="word">読み込み中...</div>
          <div id="meaning"></div>

          <div class="button-row">
            <div class="nav-box">
              <div class="nav-hint" id="prevHint"></div>
              <button class="main-btn" id="prevWordBtn">戻る</button>
            </div>

            <div class="nav-box">
              <div id="pronunciation"></div>
              <button class="main-btn speak-btn" id="speakWordBtn">発音</button>
            </div>

            <div class="nav-box">
              <div class="nav-hint" id="nextHint"></div>
              <button class="main-btn" id="nextWordBtn">進む</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
