<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>SVL</title>

  <link rel="icon" href="SVL_icon.png">
  <link rel="apple-touch-icon" href="SVL_icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      touch-action: manipulation;
      overflow: hidden;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #ffffff;
      color: #111;
    }

    button, .word-item {
      touch-action: manipulation;
    }

    body.loading {
      visibility: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: min(92vw, 700px);
      padding: 0 8px;
    }

    .vol-btn {
      font-size: 16px;
      padding: 10px 18px;
      border: 1px solid #bbb;
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      min-width: 84px;
      transition: 0.15s;
    }

    .vol-btn:hover {
      background: #f2f2f2;
    }

    .vol-btn.active-vol {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .parts-toggle-btn {
      position: absolute;
      top: 58px;
      right: 12px;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .parts-toggle-btn:hover {
      background: #f2f2f2;
    }

    .parts-panel.hidden{
      display: none;
    }

    .main-layout.parts-closed{
      grid-template-columns: minmax(0, 1fr);
    }

    .toggle-btn {
      position: absolute;
      top: 14px;
      left: 12px;
      z-index: 35;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #bbb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #f2f2f2;
    }

    .sidebar {
      position: absolute;
      top: 70px;
      left: 0;
      width: 140px;
      height: calc(100vh - 70px);
      border-right: 1px solid #ddd;
      overflow-y: auto;
      background: #fafafa;
      padding: 10px 8px 20px;
      z-index: 15;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .word-item {
      padding: 10px 8px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.2;
      word-break: break-word;
    }

    .word-item:hover {
      background: #ececec;
    }

    .word-item.active {
      background: #dcdcdc;
      font-weight: bold;
    }

    .main {
      position: absolute;
      top: 70px;
      left: 0;
      width: 100%;
      height: calc(100vh - 70px);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main.full {
      left: 0;
      width: 100%;
    }

    .main-layout {
      width: min(96vw, 1280px);
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 24px;
      align-items: center;
    }

    .center-box {
      width: 100%;
      max-width: none;
      min-width: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px 24px;
    }

    .parts-panel {
      width: 280px;
      min-width: 280px;
      max-width: 280px;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 16px;
      border-left: 1px solid #e3e3e3;
      min-width: 0;
    }

    .parts-title {
      font-size: 14px;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    #image {
      font-size: clamp(13px, 1.4vw, 17px);
      color: #666;
      line-height: 1.8;
      word-break: break-word;
      overflow-wrap: anywhere;
      text-align: left;
      min-height: 5.5em;
    }

    .hint-note {
      display: block;
      margin-top: 10px;
      font-size: 0.72em;
      color: #888;
    }

    .center-box {
      width: min(92vw, 920px);
      max-width: 920px;
      min-width: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 12px;
    }

    .current-vol {
      font-size: 14px;
      color: #666;
      letter-spacing: 0.08em;
      margin-top: 10px;
    }

    #word {
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }

    #meaning {
      font-size: clamp(22px, 3.4vw, 34px);
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    #image {
      font-size: clamp(13px, 1.6vw, 18px);
      color: #666;
      line-height: 1.7;
      max-width: min(92%, 760px);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .hint-note {
      display: block;
      margin-top: 10px;
      font-size: 0.72em;
      color: #888;
    }

    .button-row {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .nav-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 160px;
    }

    .nav-hint {
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 600;
      color: #333;
      min-height: 1.5em;
      text-align: center;
      word-break: break-word;
      max-width: 180px;
    }

    .main-btn {
      margin-top: 8px;
      font-size: clamp(18px, 2.6vw, 28px);
      padding: 16px 32px;
      border: none;
      border-radius: 16px;
      background: #111;
      color: white;
      cursor: pointer;
      transition: 0.15s;
    }

    .main-btn:hover {
      opacity: 0.92;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 110px;
      }

      .main {
        left: 110px;
        width: calc(100% - 110px);
      }
    }

    @media (max-width: 768px) {
      .top-bar {
        top: 10px;
        width: calc(100vw - 120px);
        gap: 6px;
      }

      .vol-btn {
        font-size: 14px;
        padding: 8px 12px;
        min-width: 72px;
      }

      .toggle-btn {
        top: 10px;
        left: 10px;
        font-size: 13px;
        padding: 8px 12px;
      }

      .parts-toggle-btn {
        top: 48px;
        right: 10px;
        font-size: 13px;
        padding: 8px 12px;
      }

      .sidebar {
        top: 60px;
        width: 100px;
        height: calc(100vh - 60px);
        padding: 8px 6px 16px;
      }

      .main {
        top: 60px;
        left: 100px;
        width: calc(100% - 100px);
        height: calc(100vh - 60px);
        padding: 12px;
      }

      .word-item {
        font-size: 13px;
        padding: 8px 6px;
      }

      .center-box {
        width: min(96vw, 920px);
        gap: 16px;
      }

      .main-btn {
        padding: 14px 22px;
      }

      .main-layout {
        grid-template-columns: 1fr 220px;
        gap: 14px;
      }

      .parts-panel {
        padding: 12px 10px;
      }

      #image {
        font-size: clamp(12px, 2vw, 15px);
      }
    }

    @media (max-width: 520px) {
      .top-bar {
        width: calc(100vw - 110px);
      }

      .center-box {
        gap: 14px;
      }

      #word {
        font-size: clamp(30px, 8vw, 52px);
      }

      #meaning {
        font-size: clamp(20px, 5vw, 28px);
      }

      #image {
        font-size: clamp(12px, 3vw, 15px);
      }

      .nav-hint {
        font-size: clamp(14px, 3.4vw, 18px);
      }
      .main-layout {
        grid-template-columns: 1fr 180px;
        gap: 10px;
      }

      .parts-title {
        font-size: 12px;
      }

      #image {
        font-size: clamp(11px, 2.8vw, 13px);
      }
    }
  </style>
</head>

<body class="loading">
  <div class="app">
    <button class="toggle-btn" onclick="toggleSidebar()">一覧</button>
    <button class="parts-toggle-btn" onclick="togglePartsPanel()">形態素</button>

    <div class="top-bar">
      <button class="vol-btn" onclick="loadSheet('vol1')">vol.1</button>
      <button class="vol-btn" onclick="loadSheet('vol2')">vol.2</button>
      <button class="vol-btn" onclick="loadSheet('vol3')">vol.3</button>
      <button class="vol-btn" onclick="loadSheet('vol4')">vol.4</button>
    </div>

    <div class="sidebar" id="sidebar">
      <div id="list"></div>
    </div>

    <main class="main" id="mainArea">
      <div class="main-layout" id="mainLayout">
      <div class="center-box">
        <div class="current-vol" id="current">vol.1</div>
        <div id="word">読み込み中...</div>
        <div id="meaning"></div>

        <div class="button-row">
          <div class="nav-box">
            <div class="nav-hint" id="prevHint"></div>
            <button class="main-btn" onclick="prevWord()">戻る</button>
          </div>

          <div class="nav-box">
            <div class="nav-hint" id="nextHint"></div>
            <button class="main-btn" onclick="nextWord()">進む</button>
          </div>
        </div>
      </div>

      <aside class="parts-panel" id="partsPanel">
        <div class="parts-title">morpheme 形態素</div>
        <div id="image"></div>
      </aside>
    </main>
  </div>

  <script>
    const sheetUrls = {
      vol1: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=0",
      vol2: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=1906065075",
      vol3: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=769789994",
      vol4: "https://docs.google.com/spreadsheets/d/1Kih8sWJwP1TgzUfQrHIAN-f0fiHCOrvNU3554A_DMK0/export?format=csv&gid=297106222"
    };

    const STORAGE_KEYS = {
      vol: "tango_current_vol",
      indexByVol: "tango_index_by_vol",
      sidebarOpen: "tango_sidebar_open",
      partsOpen: "tango_parts_open"
    };

    const prefixMap = {
      sub: "下に・下から",
      pro: "前へ",
      ob: "向かって",
      trans: "越えて・向こうへ",
      re: "再び・元に戻って",
      de: "下へ・離れて",
      con: "共に・一緒に",
      com: "共に・一緒に",
      in: "中へ・中に",
      im: "中へ・中に",
      ex: "外へ",
      pre: "前もって",
      inter: "間に",
      dis: "離れて・打消し",
      un: "打消し",
      ad: "〜へ"
    };

    const suffixMap = {
      ject: "投げる",
      mit: "送る・置く",
      port: "運ぶ",
      spect: "見る",
      struct: "積み上げる・組み立てる",
      scribe: "書く",
      script: "書かれたもの",
      dict: "言う",
      form: "形",
      move: "動く",
      pose: "置く",
      press: "押す",
      tract: "引く",
      vent: "来る",
      ceive: "受け取る",
      tend: "伸ばす・向ける"
    };

    let words = [];
    let index = 0;
    let currentVol = "vol1";
    let sidebarOpen = true;
    let indexByVol = {
      vol1: 0,
      vol2: 0,
      vol3: 0,
      vol4: 0
    };
    let partsOpen = true;

    function buildCoreImage(word) {
      const w = word.toLowerCase().trim();

      const prefixes = Object.keys(prefixMap).sort((a, b) => b.length - a.length);
      const suffixes = Object.keys(suffixMap).sort((a, b) => b.length - a.length);

      const foundPrefix = prefixes.find(prefix => w.startsWith(prefix));
      const foundSuffix = suffixes.find(suffix => w.endsWith(suffix));

      const lines = [];

      if (foundPrefix) {
        lines.push(`接頭辞候補：${foundPrefix}（${prefixMap[foundPrefix]}）`);
      }

      if (foundSuffix) {
        lines.push(`接尾辞候補：${foundSuffix}（${suffixMap[foundSuffix]}）`);
      }

      if (foundPrefix || foundSuffix) {
        lines.push(`<span class="hint-note">※ 確定ではなく候補</span>`);
        return lines.join("<br>");
      }

      return "";
    }

    function loadSavedState() {
      const savedVol = localStorage.getItem(STORAGE_KEYS.vol);
      const savedSidebarOpen = localStorage.getItem(STORAGE_KEYS.sidebarOpen);
      const savedIndexByVol = localStorage.getItem(STORAGE_KEYS.indexByVol);
      const savedPartsOpen = localStorage.getItem(STORAGE_KEYS.partsOpen);

      if(savedPartsOpen !== null) {
        partsOpen = savedPartsOpen === "true";
      }

      if (savedVol && sheetUrls[savedVol]) {
        currentVol = savedVol;
      }

      if (savedSidebarOpen !== null) {
        sidebarOpen = savedSidebarOpen === "true";
      }

      if (savedIndexByVol) {
        try {
          const parsed = JSON.parse(savedIndexByVol);
          indexByVol = { ...indexByVol, ...parsed };
        } catch (e) {}
      }
    }

    function saveCurrentVol() {
      localStorage.setItem(STORAGE_KEYS.vol, currentVol);
    }

    function saveIndexByVol() {
      localStorage.setItem(STORAGE_KEYS.indexByVol, JSON.stringify(indexByVol));
    }

    function saveSidebarState() {
      localStorage.setItem(STORAGE_KEYS.sidebarOpen, String(sidebarOpen));
    }

    async function loadSheet(name) {
      try {
        currentVol = name;
        saveCurrentVol();

        const res = await fetch(sheetUrls[name]);
        const text = await res.text();

        const lines = text
          .trim()
          .split("\n")
          .map(line => line.trim())
          .filter(line => line !== "");

        words = lines.map(line => {
          const [word, meaning] = line.split(",");
          return {
            word: (word || "").trim(),
            meaning: (meaning || "").trim()
          };
        }).filter(item => item.word);

        index = indexByVol[name] || 0;
        if (index >= words.length) index = 0;

        createList();
        showWord();
        updateCurrentVol();
        updateVolButtons();
        applySidebarState();

        document.body.classList.remove("loading");
      } catch (e) {
        alert("読み込みに失敗しました。スプレッドシートの共有設定をご確認ください。");
      }
    }

    function getCurrentCacheKey() {
      if (!words.length) return null;
      return "core_" + words[index].word.toLowerCase().trim();
    }

    function updateNavHints() {
      if (!words.length) return;

      const prevIndex = (index - 1 + words.length) % words.length;
      const nextIndex = (index + 1) % words.length;

      const prevHintEl = document.getElementById("prevHint");
      const nextHintEl = document.getElementById("nextHint");

      if (prevHintEl) prevHintEl.textContent = words[prevIndex].word;
      if (nextHintEl) nextHintEl.textContent = words[nextIndex].word;
    }

    function showWord() {
      if (!words.length) return;

      const current = words[index];
      document.getElementById("word").textContent = current.word;
      document.getElementById("meaning").textContent = current.meaning;

      const cacheKey = getCurrentCacheKey();
      let result = cacheKey ? localStorage.getItem(cacheKey) : null;

      if (!result) {
        result = buildCoreImage(current.word);
        if (cacheKey) {
          localStorage.setItem(cacheKey, result);
        }
      }

      document.getElementById("image").innerHTML = result || "";

      indexByVol[currentVol] = index;
      saveIndexByVol();

      highlightActiveWord();
      scrollActiveWordIntoView();
      updateNavHints();
    }

    function prevWord() {
      if (!words.length) return;
      index = (index - 1 + words.length) % words.length;
      showWord();
    }

    function nextWord() {
      if (!words.length) return;
      index = (index + 1) % words.length;
      showWord();
    }

    function createList() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      words.forEach((w, i) => {
        const div = document.createElement("div");
        div.className = "word-item";
        div.textContent = w.word;
        div.onclick = () => {
          index = i;
          showWord();
        };
        list.appendChild(div);
      });
    }

    function highlightActiveWord() {
      const items = document.querySelectorAll(".word-item");
      items.forEach((item, i) => {
        item.classList.toggle("active", i === index);
      });
    }

    function scrollActiveWordIntoView() {
      const items = document.querySelectorAll(".word-item");
      const active = items[index];
      if (active) {
        active.scrollIntoView({
          block: "center",
          behavior: "smooth"
        });
      }
    }

    function updateCurrentVol() {
      const volNumber = currentVol.replace("vol", "");
      document.getElementById("current").textContent = "vol." + volNumber;
    }

    function updateVolButtons() {
      const buttons = document.querySelectorAll(".vol-btn");
      buttons.forEach(btn => btn.classList.remove("active-vol"));

      const mapping = {
        vol1: 0,
        vol2: 1,
        vol3: 2,
        vol4: 3
      };

      const activeIndex = mapping[currentVol];
      if (buttons[activeIndex]) {
        buttons[activeIndex].classList.add("active-vol");
      }
    }

    function applySidebarState() {
      const sidebar = document.getElementById("sidebar");

      if (sidebarOpen) {
        sidebar.classList.remove("hidden");
      } else {
        sidebar.classList.add("hidden");
      }
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      saveSidebarState();
      applySidebarState();
    }

    function savePartsState() {
      localStorage.setItem(STORAGE_KEYS.partsOpen, String(partsOpen));
    }

    function togglePartsPanel() {
      partsOpen = !partsOpen;
      savePartsState();
      applyPartsState();
    }

    function applyPartsState() {
      const panel = document.getElementById("partsPanel");
      const mainLayout = document.getElementById("mainLayout");

      if (!panel || !mainLayout) return;

      if (partsOpen) {
        panel.classList.remove("hidden");
        mainLayout.classList.remove("parts-closed");
      } else {
        panel.classList.add("hidden");
        mainLayout.classList.add("parts-closed");
      }
    }

    loadSavedState();
    applyPartsState();
    loadSheet(currentVol);

    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  </script>
</body>
</html>
